<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Filmkväll</title>

  <link rel="icon" type="image/png" href="Logo.PNG" />
  <link rel="stylesheet" href="./styles.css" />

  <style>
    /* Små layout-tillägg som inte ska krocka med styles.css */
    .settings-grid{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      align-items:flex-end;
    }
    .settings-grid .col{
      flex: 1 1 220px;
      min-width: 220px;
    }
    .settings-grid .col.narrow{
      flex: 0 0 260px;
      max-width: 260px;
      min-width: 220px;
    }
    .pw-row{
      display:flex;
      gap:8px;
      align-items:center;
    }
    .pw-row input{ flex:1 1 auto; }
    .pw-row button{ white-space:nowrap; }
    .muted{ opacity:.8; }
  </style>
</head>

<body>
  <div class="wrap">
    <header class="hero">
      <img src="Logo.PNG" alt="Filmkväll logotyp" class="hero-logo" />
      <h1 class="hero-title">Filmkväll</h1>
      <div class="muted hero-version">Kodversion: <span id="appVersion">—</span></div>
    </header>

    <!-- INSTÄLLNINGAR (utan token) -->
    <div class="card" id="settingsCard">
      <div class="settings-grid">
        <div class="col narrow">
          <label for="who">Användare</label>
          <select id="who" aria-label="Användare"></select>
        </div>

        <div class="col narrow">
          <label for="pw">Lösenord</label>
          <div class="pw-row">
            <input id="pw" type="password" autocomplete="current-password" placeholder="ange lösenord" />
            <button id="togglePw" type="button" class="ghost">Visa</button>
          </div>
          <div class="muted" style="font-size:12px; margin-top:6px;">
            Sparas bara lokalt i webbläsaren.
          </div>
        </div>

        <div class="col" style="min-width:180px; max-width:220px;">
          <button id="loginBtn" type="button" class="primary" style="width:100%;">Logga in</button>
        </div>

        <div class="col narrow">
          <label for="theme">Tema</label>
          <select id="theme">
            <option value="auto" selected>Auto</option>
            <option value="dark">Mörkt</option>
            <option value="light">Ljust</option>
          </select>
        </div>

        <div class="col">
          <label>Status</label>
          <div id="apiStatus" class="pill">Init…</div>
        </div>
      </div>
    </div>

    <!-- PÅ TUR NU -->
    <div class="card" id="nowCard">
      <h3>På tur nu</h3>

      <div class="row">
        <div class="col">
          <label for="nextName">Nästa i tur</label>
          <input id="nextName" type="text" readonly />
        </div>

        <div class="col">
          <label for="suggested">Film (förslag från #1 i listan)</label>
          <input id="suggested" type="text" placeholder="Skriv film här om listan är tom…" />
        </div>
      </div>

      <!-- Valfritt: betygsrad (om ni använder den i er UI) -->
      <div id="scoresRow"></div>

      <div class="row">
        <div class="col">
          <label for="comment">Kommentar</label>
          <input id="comment" placeholder="valfritt" />
        </div>

        <div class="col" style="align-self:end;">
          <button id="saveNight" class="primary">Spara kväll</button>
          <button id="skipNext" class="ghost" style="margin-left:8px;">Hoppa över</button>
        </div>
      </div>
    </div>

    <!-- MINA KOMMANDE -->
    <div class="card">
      <h3>Mina kommande (1–5)</h3>
      <div class="wishlist-col" id="wishlistCol"></div>
      <div class="row">
        <button id="loadList" class="ghost">Hämta min lista</button>
        <button id="saveList" class="primary">Spara min lista</button>
      </div>
    </div>

    <!-- HISTORIK -->
    <div class="card">
      <h3>Historik (senaste 10)</h3>
      <div id="history"></div>
    </div>

  </div>

  <!-- Boot -->
  <script type="module" src="./app.js"></script>

  <!-- Liten “login wrapper” som bara hanterar lösenord lokalt -->
  <script>
    (function(){
      // Lokala nycklar (samma värde i båda för att vara kompatibel med olika varianter av api.js)
      const LS_KEYS = ["filmkvall_pw", "filmkvall_pw_v1"];

      const pwInput = document.getElementById("pw");
      const loginBtn = document.getElementById("loginBtn");
      const toggleBtn = document.getElementById("togglePw");

      // Förifyll om det finns
      try{
        const saved = localStorage.getItem(LS_KEYS[0]) || localStorage.getItem(LS_KEYS[1]) || "";
        if(saved) pwInput.value = saved;
      }catch{}

      function setStatus(text, ok){
        const el = document.getElementById("apiStatus");
        if(!el) return;
        el.textContent = text;
        el.className = "pill " + (ok ? "ok" : "err");
      }

      toggleBtn.addEventListener("click", ()=>{
        const isPw = pwInput.type === "password";
        pwInput.type = isPw ? "text" : "password";
        toggleBtn.textContent = isPw ? "Dölj" : "Visa";
      });

      function savePw(){
        const v = (pwInput.value || "").trim();
        try{
          LS_KEYS.forEach(k => localStorage.setItem(k, v));
        }catch{}
        // Extra: om någon del av koden läser globalt
        window.__FILMKVALL_PW__ = v;
        return v;
      }

      loginBtn.addEventListener("click", async ()=>{
        const v = savePw();
        if(!v){
          setStatus("Skriv lösenord först", false);
          return;
        }

        // Vi kan inte garantera exakt hur er api.js läser lösenord,
        // så vi “puffar” appen att prova igen.
        setStatus("Loggar in…", true);

        // Om ni har debug-panel/event, kan api.js lyssna på detta:
        window.dispatchEvent(new CustomEvent("filmkvall:auth", { detail: { pw: v } }));

        // En enkel reload är mest robust om app.js init:ar på load och api.js läser localStorage.
        // Om ni redan är inne så gör det ingen skada.
        setTimeout(()=> location.reload(), 150);
      });

      // Enter i lösenordsfältet = logga in
      pwInput.addEventListener("keydown", (e)=>{
        if(e.key === "Enter"){
          e.preventDefault();
          loginBtn.click();
        }
      });
    })();
  </script>
</body>
</html>
