<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Filmkväll</title>

  <link id="favicon" rel="icon" type="image/png" href="Logo.PNG">
  <meta property="og:title" content="Filmkväll">
  <meta property="og:type" content="website">
  <meta property="og:image" content="Logo.PNG">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:image" content="Logo.PNG">

  <style>
    :root{
      --bg:#0f1116; --panel:#161a22; --text:#e6e8ee; --muted:#9aa3b2;
      --accent:#f6c247; --ok:#2ea86b; --err:#e5534b;
      --input:#0f1116; --border:#2a3140; --btn:#1f2533; --btn-text:#e6e8ee;
      --pill-bg:#1f2533;
    }
    [data-theme="light"]{
      --bg:#f6f7fb; --panel:#ffffff; --text:#151823; --muted:#5b6475;
      --input:#ffffff; --border:#dfe3ee; --btn:#eef0f6; --btn-text:#111826;
      --pill-bg:#f1f3f8;
    }

    *{box-sizing:border-box}
    body{background:var(--bg); color:var(--text); font:16px/1.45 system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial; margin:0}
    .wrap{max-width:1100px; margin:24px auto; padding:0 16px;}
    .muted{color:var(--muted)}
    h3{margin:0 0 10px}

    /* Hero */
    .hero{display:flex; flex-direction:column; align-items:center; text-align:center; gap:8px; margin:8px 0 20px}
    .hero-logo{width:14%; max-width:180px; min-width:96px; height:auto}
    .hero-title{font-size:34px; margin:0; letter-spacing:.08em}
    .hero-version{font-size:12px}
    @media (max-width:520px){ .hero-logo{width:28%} .hero-title{font-size:26px} }

    /* Layout */
    .card{background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:16px; margin:14px 0}
    .row{display:flex; gap:12px; flex-wrap:wrap}
    .col{flex:1 1 220px; min-width:220px}
    .right{margin-left:auto}

    label{display:block; font-size:13px; color:var(--muted); margin:0 0 6px}
    input,select,textarea{
      width:100%; padding:10px 12px; border-radius:10px;
      border:1px solid var(--border); background:var(--input); color:var(--text);
      outline:none;
    }
    button{
      background:var(--btn); color:var(--btn-text); cursor:pointer;
      border:1px solid var(--border); padding:8px 12px; border-radius:9px; font-size:14px;
    }
    button:disabled{opacity:.55; cursor:not-allowed; filter:saturate(.6)}
    .primary{background:var(--accent); color:#1b1f2a; border-color:#c8a73a}
    .ghost{background:transparent}

    .pill{display:inline-block; padding:8px 12px; border-radius:999px; font-size:13px; background:var(--pill-bg); border:1px solid var(--border)}
    .ok{color:var(--ok)} .err{color:var(--err)}

    .flash{animation:flash 700ms ease}
    @keyframes flash{0%{box-shadow:0 0 0 0 rgba(246,194,71,0)}40%{box-shadow:0 0 0 6px rgba(246,194,71,.25)}100%{box-shadow:0 0 0 0 rgba(246,194,71,0)}}

    /* Scores */
    #scoresRow{display:flex; gap:8px; align-items:flex-end; flex-wrap:nowrap; overflow:auto; padding-bottom:2px}
    .score-col{min-width:100px; flex:1 1 0}
    .score-col label{margin-bottom:4px}
    .score-col select{padding:8px 10px; border-radius:8px; text-align:center; text-align-last:center}

    /* Lookup + autocomplete */
    .lookup-wrap{display:flex; gap:6px; align-items:center; flex-wrap:nowrap}
    .lookup-input{flex:1 1 auto; min-width:0; padding:10px 12px}
    .lookup-btn{
      flex:0 0 auto; width:auto; padding:6px 10px; font-size:12px; line-height:1; white-space:nowrap;
      border-radius:8px; border:1px solid var(--border); background:var(--btn); color:var(--btn-text);
    }
    .ac-wrap{ position:relative; }
    .ac-list{
      position:absolute; left:0; right:0; top:100%;
      z-index:50;
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:10px;
      margin-top:6px;
      overflow:hidden;
    }
    .ac-item{ padding:10px 12px; cursor:pointer; border-top:1px solid var(--border); font-size:14px; }
    .ac-item:first-child{ border-top:none; }
    .ac-item:hover{ filter:brightness(1.08); }
    .ac-muted{ color:var(--muted); font-size:12px; }

    /* OMDb info */
    .omdb-info{
      margin:6px 0 8px; font-size:13px; color:var(--muted);
      display:flex; align-items:flex-start; gap:8px;
    }
    .omdb-info img{ width:64px; height:auto; border-radius:6px; border:1px solid var(--border); }
    .omdb-info a{ color:inherit; text-decoration:underline; }

    /* Streaming pills */
    .streaming-wrap{margin-top:8px}
    .streaming-row{display:flex; flex-wrap:wrap; gap:4px}
    .streaming-row.collapsed{max-height:34px; overflow:hidden}
    .streaming-toggle{
      margin-top:4px;
      font-size:12px;
      padding:0;
      border:none;
      background:transparent;
      text-decoration:underline;
      cursor:pointer;
      color:var(--muted);
    }

    @media (max-width:520px){
      .lookup-wrap{flex-wrap:wrap}
      .lookup-input{flex-basis:100%}
      .lookup-btn{margin-top:4px}
    }

    /* Wishlist reorder */
    .wishlist-item{display:grid; grid-template-columns:1fr auto; gap:10px; align-items:center}
    .wishlist-move{display:flex; gap:8px; justify-content:flex-end}
    .wishlist-move button{
      width:42px; height:42px; padding:0;
      border-radius:12px;
      font-size:18px; line-height:1;
      display:flex; align-items:center; justify-content:center;
      touch-action:manipulation;
    }

    /* Tops */
    #tops .row{ display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    #tops .col{ display:flex; flex-direction:column; gap:6px; }
    @media (max-width:640px){ #tops .row{ grid-template-columns:1fr; } }

    /* Compact login (not dominating) */
    details.login{ margin:10px 0 0; }
    details.login > summary{ cursor:pointer; user-select:none; }
    .login-grid{ display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end; margin-top:10px }
    .login-grid .col{ min-width:220px }
    .login-row{ display:flex; gap:8px; align-items:center }
    .login-row input,.login-row select,.login-row button{ height:42px }
    .login-row input,.login-row select{ flex:1 1 auto; min-width:0 }
    .login-row button{ flex:0 0 auto; white-space:nowrap }
  </style>
</head>

<body>
  <div class="wrap">
    <header class="hero">
      <img id="logoImg" src="Logo.PNG" alt="Filmkväll logotyp" class="hero-logo" />
      <h1 class="hero-title">Filmkväll</h1>
      <div class="muted hero-version">Kodversion: <span id="appVersion">–</span></div>

      <!-- “Lägre och mindre dominerande”: inloggning som expanderbar -->
      <details class="login" id="loginDetails">
        <summary class="muted">
          Inloggning & användare
          <span id="authPill" class="pill" style="margin-left:8px; padding:4px 10px">Ej inloggad</span>
        </summary>

        <div class="login-grid">
          <div class="col" style="max-width:260px">
            <label for="who">Användare</label>
            <div class="login-row">
              <select id="who" aria-label="Användare"></select>
            </div>
          </div>

          <div class="col" style="max-width:360px">
            <label for="pwInput">Lösenord</label>
            <div class="login-row">
              <input id="pwInput" type="password" autocomplete="current-password" placeholder="ange lösenord" />
              <button id="togglePw" type="button" class="ghost" aria-label="Visa/Dölj lösenord">Visa</button>
              <button id="loginBtn" type="button" class="primary">Logga in</button>
            </div>
          </div>

          <div class="col" style="min-width:220px; flex:1 1 260px">
            <div class="muted" style="font-size:12px">
              Efter inloggning låses knappar/poäng upp.
            </div>
          </div>
        </div>
      </details>
    </header>

    <!-- På tur nu -->
    <div class="card" id="nowCard">
      <h3>På tur nu</h3>

      <div class="row">
        <div class="col">
          <label>Nästa i tur</label>
          <input id="nextName" type="text" readonly>
        </div>

        <div class="col">
          <label>Film (förslag från #1 i listan)</label>
          <div class="lookup-wrap ac-wrap">
            <input
              id="suggested"
              class="lookup-input"
              type="text"
              readonly
              placeholder="Skriv film här om listan är tom…"
              autocomplete="off"
              autocapitalize="off"
              spellcheck="false"
            >
            <button class="lookup-btn" data-lookup="suggested" type="button">Sök</button>
            <div class="ac-list" id="ac-suggested" style="display:none"></div>
          </div>

          <div id="suggested-info" class="omdb-info"></div>
        </div>
      </div>

      <!-- Poäng -->
      <div id="scoresRow"></div>

      <div class="row">
        <span class="right"></span>
        <button id="toggleAdvanced" type="button" class="ghost">Hoppa över</button>
      </div>

      <div class="row" id="advancedRow" style="display:none; gap:8px; align-items:flex-end">
        <div class="col" style="min-width:220px; flex:0 0 260px">
          <label>Hoppa till (nästa i tur överst)</label>
          <select id="jumpTo"></select>
        </div>
        <div class="col" style="align-self:end; flex:0 0 auto">
          <button id="doJump" type="button" class="ghost" disabled>Byt tur</button>
        </div>
        <div class="col" style="align-self:end; flex:1 1 auto">
          <div class="muted" style="font-size:12px">Används bara vid undantag. Vanligtvis tar man sin tur.</div>
        </div>
      </div>

      <div class="row">
        <div class="col">
          <label>Kommentar</label>
          <input id="comment" placeholder="valfritt">
        </div>
        <div class="col" style="align-self:end">
          <button id="saveNight" class="primary" type="button">Spara kväll</button>
        </div>
      </div>
    </div>

    <!-- Min lista -->
    <div class="card">
      <h3>Mina kommande (1–5)</h3>

      <div class="wishlist-col" id="wishlistCol">
        <!-- w1..w5 -->
        <div class="wishlist-item">
          <div class="lookup-wrap ac-wrap">
            <input id="w1" class="lookup-input" placeholder="#1 – högst upp" autocomplete="off">
            <button class="lookup-btn" data-lookup="w1" type="button">Sök</button>
            <div class="ac-list" id="ac-w1" style="display:none"></div>
          </div>
          <div class="wishlist-move" aria-label="Flytta önskan">
            <button type="button" class="ghost" data-move="up" data-i="1" aria-label="Flytta upp" disabled>▲</button>
            <button type="button" class="ghost" data-move="down" data-i="1" aria-label="Flytta ner">▼</button>
          </div>
        </div>
        <div id="w1-info" class="omdb-info"></div>

        <div class="wishlist-item">
          <div class="lookup-wrap ac-wrap">
            <input id="w2" class="lookup-input" placeholder="#2" autocomplete="off">
            <button class="lookup-btn" data-lookup="w2" type="button">Sök</button>
            <div class="ac-list" id="ac-w2" style="display:none"></div>
          </div>
          <div class="wishlist-move" aria-label="Flytta önskan">
            <button type="button" class="ghost" data-move="up" data-i="2" aria-label="Flytta upp">▲</button>
            <button type="button" class="ghost" data-move="down" data-i="2" aria-label="Flytta ner">▼</button>
          </div>
        </div>
        <div id="w2-info" class="omdb-info"></div>

        <div class="wishlist-item">
          <div class="lookup-wrap ac-wrap">
            <input id="w3" class="lookup-input" placeholder="#3" autocomplete="off">
            <button class="lookup-btn" data-lookup="w3" type="button">Sök</button>
            <div class="ac-list" id="ac-w3" style="display:none"></div>
          </div>
          <div class="wishlist-move" aria-label="Flytta önskan">
            <button type="button" class="ghost" data-move="up" data-i="3" aria-label="Flytta upp">▲</button>
            <button type="button" class="ghost" data-move="down" data-i="3" aria-label="Flytta ner">▼</button>
          </div>
        </div>
        <div id="w3-info" class="omdb-info"></div>

        <div class="wishlist-item">
          <div class="lookup-wrap ac-wrap">
            <input id="w4" class="lookup-input" placeholder="#4" autocomplete="off">
            <button class="lookup-btn" data-lookup="w4" type="button">Sök</button>
            <div class="ac-list" id="ac-w4" style="display:none"></div>
          </div>
          <div class="wishlist-move" aria-label="Flytta önskan">
            <button type="button" class="ghost" data-move="up" data-i="4" aria-label="Flytta upp">▲</button>
            <button type="button" class="ghost" data-move="down" data-i="4" aria-label="Flytta ner">▼</button>
          </div>
        </div>
        <div id="w4-info" class="omdb-info"></div>

        <div class="wishlist-item">
          <div class="lookup-wrap ac-wrap">
            <input id="w5" class="lookup-input" placeholder="#5" autocomplete="off">
            <button class="lookup-btn" data-lookup="w5" type="button">Sök</button>
            <div class="ac-list" id="ac-w5" style="display:none"></div>
          </div>
          <div class="wishlist-move" aria-label="Flytta önskan">
            <button type="button" class="ghost" data-move="up" data-i="5" aria-label="Flytta upp">▲</button>
            <button type="button" class="ghost" data-move="down" data-i="5" aria-label="Flytta ner" disabled>▼</button>
          </div>
        </div>
        <div id="w5-info" class="omdb-info"></div>
      </div>

      <div class="row">
        <button id="loadList" class="ghost" type="button">Hämta min lista</button>
        <button id="saveList" class="primary" type="button">Spara min lista</button>
      </div>
    </div>

    <!-- Topplistor -->
    <div class="card">
      <h3>Topplistor (topp 5)</h3>
      <div id="tops"></div>
    </div>

    <!-- Historik -->
    <div class="card">
      <h3>Historik (senaste 10)</h3>
      <div id="history"></div>
    </div>

    <!-- Tema + Status + Felsök (längst ner) -->
    <div class="card" id="bottomCard">
      <div class="row" style="align-items:flex-end">
        <div class="col" style="max-width:260px">
          <label for="theme">Tema</label>
          <select id="theme">
            <option value="auto" selected>Auto</option>
            <option value="dark">Mörkt</option>
            <option value="light">Ljust</option>
          </select>
        </div>
        <div class="col">
          <label>Status</label>
          <div id="apiStatus" class="pill">Init…</div>
        </div>
      </div>

      <details style="margin-top:12px">
        <summary class="muted">Felsök (visa teknisk info)</summary>

        <div class="row" style="margin-top:10px">
          <div class="col" style="min-width:220px">
            <label for="backendToken">Backend-token (valfritt, lagras lokalt)</label>
            <input id="backendToken" placeholder="token">
          </div>
          <div class="col" style="min-width:220px">
            <label for="tmdbKey">TMDb-nyckel (valfritt, lagras lokalt)</label>
            <input id="tmdbKey" placeholder="tmdb api key">
          </div>
          <div class="col" style="min-width:220px">
            <label for="omdbKey">OMDb-nyckel (valfritt, lagras lokalt)</label>
            <input id="omdbKey" placeholder="omdb api key">
          </div>
          <div class="col" style="min-width:220px">
            <label for="watchmodeKey">Watchmode-nyckel (valfritt, lagras lokalt)</label>
            <input id="watchmodeKey" placeholder="watchmode api key">
          </div>
        </div>

        <pre id="debugPre" style="white-space:pre-wrap; word-break:break-word; margin:10px 0 0; padding:10px; border:1px solid var(--border); border-radius:10px; background:var(--input);">Ingen debug-data ännu.</pre>
        <button id="copyDebug" type="button" class="ghost" style="margin-top:8px">Kopiera felsökning</button>
      </details>
    </div>
  </div>

<script>
/********************************************************************
 * Filmkväll – single file
 * Säkerhet:
 * - Inga hemligheter i repo: pw/token/externa nycklar lagras lokalt
 * - POST till Apps Script (pw/token i body, inte URL)
 * UX:
 * - SWR-cache + save-queue
 * - Autocomplete + OMDb/TMDb + valfri Watchmode (lazy)
 * - Topplistor: top 5 film + top 5 väljare
 ********************************************************************/

// ===== KONFIG (publik) =====
const API_URL = 'https://script.google.com/macros/s/AKfycby82y98CZDZc4d9tSdyi-dovoHf84sx4LC0RLQ-SosU44_BlNPzhsqWhqkNHU5Vsw7hrA/exec';
const PEOPLE  = ['Hannah','Maria','Tuva','Alva','Lars'];

// ===== Version =====
const APP_VERSION = (()=> {
  try{
    const d = new Date(document.lastModified);
    if(isNaN(d)) return 'okänd';
    const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), day=String(d.getDate()).padStart(2,'0');
    const hh=String(d.getHours()).padStart(2,'0'), mm=String(d.getMinutes()).padStart(2,'0');
    return `${y}-${m}-${day} ${hh}:${mm}`;
  }catch{ return 'okänd'; }
})();

// ===== LocalStorage keys =====
const LS = {
  who: 'film_who',
  theme: 'film_theme',
  pw: 'filmkvall_pw_v3',
  token: 'filmkvall_backend_token_v1',
  tmdb: 'filmkvall_tmdb_key_v1',
  omdb: 'filmkvall_omdb_key_v1',
  watchmode: 'filmkvall_watchmode_key_v1',
  savequeue: 'filmkvall_savequeue_v1',
  cachePrefix: 'filmkvall_cache_',
  lastNightSave: 'filmkvall_lastNightSave_v1',
};

const $  = (s)=>document.querySelector(s);
const $$ = (s)=>document.querySelectorAll(s);
const escapeHtml = (s)=>String(s||'').replace(/[&<>"']/g, m=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m]));

// ===== LocalStorage helpers =====
function lsGet(k){ try{ return localStorage.getItem(k) || ''; } catch { return ''; } }
function lsSet(k,v){ try{ localStorage.setItem(k, String(v ?? '')); } catch {} }
function getSavedPw(){ return (lsGet(LS.pw) || '').trim(); }
function setSavedPw(pw){ lsSet(LS.pw, String(pw||'').trim()); }
function getSavedToken(){ return (lsGet(LS.token) || '').trim(); }
function setSavedToken(t){ lsSet(LS.token, String(t||'').trim()); }
function getKey(name){
  if(name==='tmdb') return (lsGet(LS.tmdb)||'').trim();
  if(name==='omdb') return (lsGet(LS.omdb)||'').trim();
  if(name==='watchmode') return (lsGet(LS.watchmode)||'').trim();
  return '';
}

// ===== Theme =====
function applyTheme(){
  const sel = $('#theme')?.value || 'auto';
  const root = document.documentElement;
  let mode = sel;
  if(sel === 'auto') mode = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
  if(mode === 'light') root.setAttribute('data-theme','light');
  else root.removeAttribute('data-theme');
  root.style.colorScheme = (mode === 'light') ? 'light' : 'dark';
}
const _mqlLight = window.matchMedia('(prefers-color-scheme: light)');
const _onSchemeChange = ()=>{ if(($('#theme')?.value || 'auto') === 'auto') applyTheme(); };
_mqlLight.addEventListener?.('change', _onSchemeChange);
_mqlLight.addListener?.(_onSchemeChange);

// ===== Debug buffer =====
const DBG = (window.__FILMKVALL_DEBUG__ = window.__FILMKVALL_DEBUG__ || []);
function dbgPush(obj){
  try{
    DBG.push({ t: new Date().toISOString(), ...obj });
    if(DBG.length > 200) DBG.splice(0, DBG.length - 200);
    const pre = $('#debugPre');
    if(pre) pre.textContent = JSON.stringify(DBG, null, 2);
  }catch{}
}

// ===== Status =====
function pendingCount(){ return (SaveQueue.read() || []).length; }
function setStatus(ok, msg){
  const el = $('#apiStatus');
  if(!el) return;
  el.textContent = msg + (pendingCount() ? ` (${pendingCount()} i kö)` : '');
  el.className = 'pill ' + (ok ? 'ok' : 'err');
}
function setAuthPill(isAuthed){
  const el = $('#authPill');
  if(!el) return;
  el.textContent = isAuthed ? 'Inloggad' : 'Ej inloggad';
  el.className = 'pill ' + (isAuthed ? 'ok' : 'err');
  el.style.padding = '4px 10px';
}

// ===== Cache (local) =====
const Cache = {
  key(k){ return LS.cachePrefix + k; },
  get(k){ try { return JSON.parse(localStorage.getItem(this.key(k)) || 'null'); } catch { return null; } },
  set(k, v){ try { localStorage.setItem(this.key(k), JSON.stringify(v)); } catch {} },
  del(k){ try { localStorage.removeItem(this.key(k)); } catch {} },
};

async function fetchJsonSWR({ key, fetcher, maxAgeMs=30_000, onFresh, fingerprint }){
  const cached = Cache.get(key);
  const now = Date.now();

  if (cached?.data){
    if (!cached.savedAt || (now - cached.savedAt) > maxAgeMs) refresh();
    return cached.data;
  }

  const data = await fetcher();
  Cache.set(key, {savedAt: Date.now(), data, fp: safeFp(data)});
  return data;

  function safeFp(x){
    try{ if(typeof fingerprint === 'function') return String(fingerprint(x)); }catch{}
    try{
      if (x == null) return 'null';
      if (typeof x !== 'object') return String(x);
      if (Array.isArray(x)) return 'a:' + x.length;
      if ('rows' in x && Array.isArray(x.rows)){
        const r = x.rows;
        const last = r[0] || r[r.length-1] || {};
        return `rows:${r.length}:${last['Datum']||''}:${last['Film']||''}`;
      }
      if ('bestFilms' in x || 'bestPickers' in x){
        const bf = Array.isArray(x.bestFilms) ? x.bestFilms[0] : null;
        const bp = Array.isArray(x.bestPickers) ? x.bestPickers[0] : null;
        return `tops:${x.ok?'1':'0'}:${bf?.film||''}:${bf?.avg||''}:${bp?.who||''}:${bp?.avg||''}`;
      }
      if ('R1' in x || 'R2' in x || 'R3' in x || 'R4' in x || 'R5' in x){
        return `wl:${x.ok?'1':'0'}:${x.R1||''}:${x.R2||''}:${x.R3||''}:${x.R4||''}:${x.R5||''}`;
      }
      if ('next' in x || 'suggestion' in x){
        const sc = PEOPLE.map(p=>x?.scores?.[p] ?? '').join(',');
        return `cur:${x.ok?'1':'0'}:${x.next||''}:${x.suggestion||''}:${sc}`;
      }
      return 'o:' + Object.keys(x).length;
    }catch{ return 'x'; }
  }

  async function refresh(){
    try{
      const fresh = await fetcher();
      const fpNew = safeFp(fresh);
      const fpOld = cached?.fp ?? safeFp(cached?.data);
      Cache.set(key, {savedAt: Date.now(), data: fresh, fp: fpNew});
      if(fpOld !== fpNew) onFresh?.(fresh);
    }catch{}
  }
}

// ===== SaveQueue =====
const SaveQueue = {
  read(){ try{ return JSON.parse(localStorage.getItem(LS.savequeue) || '[]'); } catch { return []; } },
  write(q){ try{ localStorage.setItem(LS.savequeue, JSON.stringify(q || [])); } catch {} },
  enqueue(job){
    const q = this.read();
    q.push({ ...job, ts: Date.now() });
    this.write(q);
    updatePendingBadge();
  },
  async flush(flusher){
    const q = this.read();
    if(!q.length) return;
    const remaining = [];
    for(let i=0;i<q.length;i++){
      const job = q[i];
      try{ await flusher(job); }
      catch(e){
        remaining.push(job, ...q.slice(i+1));
        this.write(remaining);
        updatePendingBadge();
        throw e;
      }
    }
    this.write([]);
    updatePendingBadge();
  }
};

let flushTimer = null;
function scheduleFlush(flusher, delayMs=700){
  clearTimeout(flushTimer);
  flushTimer = setTimeout(async ()=>{
    try{ await SaveQueue.flush(flusher); scheduleSoftReload(); }
    catch{}
  }, delayMs);
}
window.addEventListener('online', ()=>scheduleFlush(sendJobToServer, 200));
document.addEventListener('visibilitychange', ()=>{ if(document.visibilityState==='visible') scheduleFlush(sendJobToServer, 200); });

const NightSaveGuard = {

    const d=new Date();
    const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), day=String(d.getDate()).padStart(2,'0');
    return `${y}-${m}-${day}`;
  },
  normFilm(s){ return String(s||'').trim().toLowerCase().normalize('NFKD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,' '); },
  getScoresObj(){
    const scores = {};
    for(const p of PEOPLE){ scores[p] = ($('#s-'+p)?.value || '').trim(); }
    return scores;
  },
  snapshot(){
    const who = ($('#nextName')?.value || '').trim();
    const film = ($('#suggested')?.value || '').trim();
    const comment = ($('#comment')?.value || '').trim();
    const key = `${this.getLocalDateISO()}::${who}::${this.normFilm(film)}`;

  write(obj){ try{ localStorage.setItem(LS.lastNightSave, JSON.stringify(obj)); } catch {} },
  shouldBlockSave(){
    const snap = this.snapshot();
    const last = this.read();
    if(!last) return { block:false, snap };
    const sameKey = last.key === snap.key;
    const sameScores = last.scoresHash === snap.scoresHash;
    const sameComment = (last.commentHash||'') === (snap.commentHash||'');
    return { block: (sameKey && sameScores && sameComment), snap };

  lockButton(msg){ const btn = $('#saveNight'); if(!btn) return; btn.disabled = true; btn.textContent = msg || 'Kväll sparad'; },
  unlockButton(){ const btn = $('#saveNight'); if(!btn) return; btn.disabled = false; btn.textContent = 'Spara kväll'; },

};

// ===== Backend API (POST) =====
async function apiCallRaw(action, payload = {}){
  const pw = getSavedPw();
  const token = getSavedToken();

  const bodyObj = { action, pw, ...(token ? { token } : {}), ...payload };
  const params = new URLSearchParams();
  for(const [k,v] of Object.entries(bodyObj)){
    if(v === undefined) continue;
    if(v && typeof v === 'object') params.set(k, JSON.stringify(v));
    else params.set(k, String(v));
  }

  dbgPush({ kind:'request', action, payload: { ...bodyObj, pw: pw ? '***' : '', token: token ? '***' : '' } });

  let res, text = '';
  try{
    res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type':'application/x-www-form-urlencoded;charset=UTF-8' },
      cache: 'no-store',
      body: params.toString(),
    });

    text = await res.text().catch(()=> '');
    let data = null;
    try{ data = text ? JSON.parse(text) : null; }catch{}
    dbgPush({ kind:'response', action, status: res.status, ok: res.ok, data, raw: data ? undefined : text.slice(0,2000) });

    if(!res.ok) return { ok:false, error:`HTTP ${res.status} ${res.statusText}` };
    if(!data || typeof data !== 'object') return { ok:false, error:'Bad JSON from backend' };
    return data;
  }catch(err){
    dbgPush({ kind:'error', action, message: String(err), status: res && res.status, raw: text.slice(0,2000) });
    return { ok:false, error: String(err) };
  }
}

async function apiCallOk(action, payload = {}){
  const j = await apiCallRaw(action, payload);
  if(!j || j.ok !== true) throw new Error(j?.error || 'API error');
  return j;
}

async function sendJobToServer(job){
  const { action, payload } = job || {};
  return await apiCallOk(action, payload || {});
}
function enqueueAndSync(action, payload){
  SaveQueue.enqueue({ action, payload });
  scheduleFlush(sendJobToServer, 700);
}

function orderedTurnList(){
  const cur = ($('#nextName')?.value || '').trim();
  const n = PEOPLE.length;
  const idx = Math.max(0, PEOPLE.indexOf(cur));
  const order = [];
  for(let k=0;k<n;k++) order.push(PEOPLE[(idx+k)%n]);
  return order;
}
function stepsToPerson(target){
  const cur = ($('#nextName')?.value || '').trim();
  const a = PEOPLE.indexOf(cur);
  const b = PEOPLE.indexOf(target);
  if(a < 0 || b < 0) return 0;
  const n = PEOPLE.length;
  return (b - a + n) % n;
}
function updateJumpOptions({preserveSelection=true, forceDefault=false} = {}){
  const sel = $('#jumpTo');
  const btn = $('#doJump');
  if(!sel || !btn) return;

  const order = orderedTurnList();
  const prev = (sel.value || '').trim();

  sel.innerHTML = order.map(p=>`<option value="${escapeHtml(p)}">${escapeHtml(p)}</option>`).join('');
  let nextVal = order[0] || '';
  if(!forceDefault && preserveSelection && prev && order.includes(prev)) nextVal = prev;
  sel.value = nextVal;

  btn.disabled = !IS_AUTHED || (stepsToPerson(sel.value) === 0);
}

// ===== Lookup / metadata =====
function imdbUrlFrom(j){ return j?.imdbID ? `https://www.imdb.com/title/${j.imdbID}/` : ''; }
function normLite(s){
  return String(s||'').toLowerCase().normalize('NFKD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-z0-9åäö\s:!?.\-]/g,'').trim();
}
async function getMetaCached(key, fetcher, ttlMs){
  const cached = Cache.get(key);
  const now = Date.now();
  if(cached?.data && cached.savedAt && (now - cached.savedAt) < ttlMs) return cached.data;
  const data = await fetcher();
  Cache.set(key, {savedAt: now, data});
  return data;
}

async function tmdbSearchMovies(query, limit=8){
  const key = getKey('tmdb');
  if(!key || !query) return [];
  const url = `https://api.themoviedb.org/3/search/movie?api_key=${encodeURIComponent(key)}&language=sv-SE&include_adult=false&query=${encodeURIComponent(query)}`;
  const r = await fetch(url, {cache:'no-store'}).catch(()=>null);
  if(!r || !r.ok) return [];
  const j = await r.json();
  const res = Array.isArray(j?.results) ? j.results : [];
  return res.slice(0, limit).map(it=>({ title: it.title || it.original_title || '', year: (it.release_date||'').slice(0,4) || '' }));
}
async function tmdbLookup(query){
  const key = getKey('tmdb');
  if(!key || !query) return null;

  const url = `https://api.themoviedb.org/3/search/movie?api_key=${encodeURIComponent(key)}&language=sv-SE&include_adult=false&query=${encodeURIComponent(query)}`;
  const r = await fetch(url, {cache:'no-store'}).catch(()=>null);
  if(!r || !r.ok) return null;
  const j = await r.json();
  const results = Array.isArray(j?.results) ? j.results : [];
  if(!results.length) return null;

  const qn = normLite(query);
  const best = results
    .map(it=>{
      const tn = normLite(it.title || it.original_title);
      let score = 0;
      if(tn === qn) score = 100;
      else if(tn.startsWith(qn)) score = 80;
      else if(tn.includes(qn)) score = 60;
      score += Math.min(20, (it.vote_count||0)/1000);
      return {score, it};
    })
    .sort((a,b)=>b.score-a.score)[0]?.it;

  if(!best) return null;

  let imdbID = '';
  try{
    const idsUrl = `https://api.themoviedb.org/3/movie/${best.id}/external_ids?api_key=${encodeURIComponent(key)}`;
    const r2 = await fetch(idsUrl, {cache:'no-store'}).catch(()=>null);
    if(r2 && r2.ok){
      const ids = await r2.json();
      imdbID = ids?.imdb_id || '';
    }
  }catch{}

  const poster = best.poster_path ? `https://image.tmdb.org/t/p/w92${best.poster_path}` : 'N/A';
  const year = (best.release_date||'').slice(0,4) || '';
  return { Title: best.title || best.original_title || '', Year: year, Poster: poster, imdbID, imdbRating: '-' };
}
async function omdbLookup(query){
  const key = getKey('omdb');
  if(!key || !query) return null;

  let q = query.trim(), year = null;
  const mYear = q.match(/\((\d{4})\)$/);
  if(mYear){ year = mYear[1]; q = q.replace(/\s*\(\d{4}\)\s*$/,''); }

  const tt = (q.match(/tt\d{7,}/i) || q.match(/imdb\.com\/title\/(tt\d+)/i));
  if(tt){
    const id = (tt[1] || tt[0]).replace(/^.*(tt\d+).*$/,'$1');
    const r = await fetch(`https://www.omdbapi.com/?apikey=${encodeURIComponent(key)}&i=${encodeURIComponent(id)}&plot=short`,{cache:'no-store'}).catch(()=>null);
    const j = r ? await r.json() : null;
    if(j && j.Response !== 'False') return j;
    return null;
  }

  try{
    const r1 = await fetch(`https://www.omdbapi.com/?apikey=${encodeURIComponent(key)}&t=${encodeURIComponent(q)}${year?`&y=${year}`:''}&type=movie&plot=short`,{cache:'no-store'});
    const j1 = await r1.json();
    if(j1 && j1.Response !== 'False') return j1;
  }catch{}

  try{
    const r2 = await fetch(`https://www.omdbapi.com/?apikey=${encodeURIComponent(key)}&s=${encodeURIComponent(q)}&type=movie`,{cache:'no-store'});
    const j2 = await r2.json();
    if(j2 && j2.Response !== 'False' && Array.isArray(j2.Search) && j2.Search.length){
      return await omdbLookup(j2.Search[0].Title);
    }
  }catch{}

  return null;
}

async function smartLookup(query){
  if(!query) return null;
  const q = query.trim();
  const cacheKey = `smartLookup_v1_${normLite(q)}`;
  return getMetaCached(cacheKey, async ()=>{
    if(/\btt\d{7,}\b/i.test(q) || /imdb\.com\/title\/tt\d+/i.test(q)){
      const om = await omdbLookup(q);
      if(om) return om;
    }
    const tm = await tmdbLookup(q);
    if(tm){
      if(tm.imdbID) return tm;
      const tryOm = await omdbLookup(`${tm.Title} (${tm.Year||''})`);
      return tryOm || tm;
    }
    return await omdbLookup(q);
  }, 30*24*3600_000);
}

// Watchmode (valfritt, lazy)
const _wmIdCache = new Map();
async function wmTitleIdFromImdb(imdbID){
  const key = getKey('watchmode');
  if(!key || !imdbID) return null;
  try{
    const u1 = `https://api.watchmode.com/v1/find/?apiKey=${encodeURIComponent(key)}&source=imdb&external_id=${encodeURIComponent(imdbID)}`;
    let r = await fetch(u1, {cache:'no-store'});
    if(r.ok){ const j = await r.json(); if(j && j.title_id) return j.title_id; }
    const u2 = `https://api.watchmode.com/v1/search/?apiKey=${encodeURIComponent(key)}&search_field=imdb_id&search_value=${encodeURIComponent(imdbID)}`;
    r = await fetch(u2, {cache:'no-store'});
    if(r.ok){
      const j = await r.json();
      const hit = Array.isArray(j?.title_results) ? j.title_results.find(t => String(t.imdb_id) === String(imdbID)) : null;
      if(hit?.id) return hit.id;
    }
  }catch{}
  return null;
}
async function getWmIdCached(imdbID){
  if(_wmIdCache.has(imdbID)) return _wmIdCache.get(imdbID);
  const id = await wmTitleIdFromImdb(imdbID);
  _wmIdCache.set(imdbID, id);
  return id;
}
async function getStreamingInfo(imdbID){
  const key = getKey('watchmode');
  if(!key || !imdbID) return null;

  return getMetaCached(`wm_sources_${imdbID}`, async ()=>{
    try{
      const wmId = await getWmIdCached(imdbID);
      if(!wmId) return null;
      const url = `https://api.watchmode.com/v1/title/${wmId}/sources/?apiKey=${encodeURIComponent(key)}`;
      const res = await fetch(url, { cache: 'no-store' });
      const data = await res.json();
      if (!Array.isArray(data)) return null;

      const seen = new Set();
      const normalizeName = s => String(s || '').replace(/\s*\(with Ads\)$/i, '').replace(/\s+HD$/,'').trim();

      const filtered = data
        .filter(s => s.type === 'sub' && s.name)
        .map(s => ({
          service: normalizeName(s.name),
          quality: (s.format === '4K' || s.format === 'HD') ? s.format : '',
          region: s.region || '',
          link: s.web_url || ''
        }))
        .filter(s => {
          const k = `${s.service}|${s.quality}|${s.region}`;
          if (seen.has(k)) return false;
          seen.add(k);
          return true;
        })
        .sort((a, b) => (a.service + a.region + a.quality).localeCompare(b.service + b.region + b.quality));

      return filtered.length ? filtered : null;
    }catch{ return null; }
  }, 7*24*3600_000);
}

async function renderOmdbInfo(containerId, data, query, opts = {}){
  const withStreaming = (opts.withStreaming !== false);
  const el = document.getElementById(containerId);
  if (!el) return;

  if (!data) {
    el.innerHTML = query ? `<div style="color:var(--muted)">Hittade inget för: ${escapeHtml(query || '')}</div>` : '';
    return;
  }

  const title  = escapeHtml(data.Title || '');
  const year   = escapeHtml(data.Year || '');
  const rating = escapeHtml(data.imdbRating || '-');
  const link   = imdbUrlFrom(data);
  const poster = (data.Poster && data.Poster !== 'N/A')
    ? `<img src="${data.Poster}" alt="poster" loading="lazy" decoding="async">`
    : '';

  let streamingHtml = '';
  if (withStreaming && data.imdbID && getKey('watchmode')) {
    const cacheKey = `wm_sources_${data.imdbID}`;
    const cached = Cache.get(cacheKey)?.data || null;

    const buildPills = (options) => {
      if (!options || !options.length) {
        return `<div style="margin-top:6px; color:var(--muted); font-size:12px">Inget abonnemang hittades just nu.</div>`;
      }
      const pills = options.map(opt => {
        const label = [opt.service, opt.quality ? ` ${opt.quality}` : '', opt.region ? ` · ${opt.region}` : ''].join('');
        const href = opt.link ? `href="${opt.link}" target="_blank" rel="noopener"` : '';
        return `<a ${href} class="pill" style="text-decoration:none">${escapeHtml(label)} (ingår)</a>`;
      }).join('');

      return `
        <div class="streaming-wrap" data-imdb="${escapeHtml(data.imdbID)}">
          <strong>Tillgängligt i abonnemang (globalt):</strong>
          <div class="streaming-row collapsed">${pills}</div>
          <button type="button" class="streaming-toggle" style="display:none">…</button>
        </div>`;
    };

    if (cached) {
      streamingHtml = buildPills(cached);
    } else {
      streamingHtml = `
        <div class="streaming-wrap" data-imdb="${escapeHtml(data.imdbID)}">
          <strong>Tillgängligt i abonnemang (globalt):</strong>
          <div style="margin-top:6px; color:var(--muted); font-size:12px">(klicka för att hämta)</div>
          <button type="button" class="streaming-toggle" style="display:inline-block">…</button>
        </div>`;
    }
  }

  el.innerHTML = `
    ${poster}
    <div>
      <strong>${title}</strong>${year ? ` (${year})` : ''}<br>
      IMDb ${rating}${link ? ` — <a href="${link}" target="_blank" rel="noopener">Öppna på IMDb</a>` : ''}
      ${streamingHtml}
    </div>`;

  const wrap = el.querySelector('.streaming-wrap');
  const row = el.querySelector('.streaming-row');
  const toggle = el.querySelector('.streaming-toggle');
  if (!wrap || !toggle) return;

  const imdbID = wrap.getAttribute('data-imdb') || '';

  const ensureToggleVisibility = (rowEl)=>{
    if(!rowEl) return;
    requestAnimationFrame(()=>{
      const needs = rowEl.scrollHeight > rowEl.clientHeight + 2;
      toggle.style.display = needs ? 'inline-block' : 'none';
      toggle.textContent = rowEl.classList.contains('collapsed') ? '…' : 'visa färre';
    });
  };

  if (row) {
    ensureToggleVisibility(row);
    toggle.addEventListener('click', () => {
      const collapsed = row.classList.toggle('collapsed');
      toggle.textContent = collapsed ? '…' : 'visa färre';
    });
    return;
  }

  toggle.addEventListener('click', async () => {
    if (!imdbID) return;
    toggle.disabled = true;
    toggle.textContent = 'hämtar…';
    const options = await getStreamingInfo(imdbID);

    const html = (options && options.length)
      ? (() => {
          const pills = options.map(opt => {
            const label = [opt.service, opt.quality ? ` ${opt.quality}` : '', opt.region ? ` · ${opt.region}` : ''].join('');
            const href = opt.link ? `href="${opt.link}" target="_blank" rel="noopener"` : '';
            return `<a ${href} class="pill" style="text-decoration:none">${escapeHtml(label)} (ingår)</a>`;
          }).join('');
          return `<div class="streaming-row collapsed">${pills}</div>`;
        })()
      : `<div style="margin-top:6px; color:var(--muted); font-size:12px">Inget abonnemang hittades just nu.</div>`;

    wrap.insertAdjacentHTML('beforeend', html);
    const newRow = wrap.querySelector('.streaming-row');
    if (!newRow) { toggle.remove(); return; }

    toggle.disabled = false;
    toggle.textContent = '…';
    ensureToggleVisibility(newRow);
    toggle.onclick = () => {
      const collapsed = newRow.classList.toggle('collapsed');
      toggle.textContent = collapsed ? '…' : 'visa färre';
    };
  });
}

// ===== Autocomplete (TMDb) =====
function debounce(fn, ms=250){ let t; return (...args)=>{ clearTimeout(t); t = setTimeout(()=>fn(...args), ms); }; }
function hideAc(id){ const box = document.getElementById(`ac-${id}`); if(box){ box.style.display='none'; box.innerHTML=''; } }
function showAc(id, items, onPick){
  const box = document.getElementById(`ac-${id}`);
  if(!box) return;
  if(!items.length){ hideAc(id); return; }

  box.innerHTML = items.map((x,i)=>`
    <div class="ac-item" data-i="${i}">
      <div><strong>${escapeHtml(x.title)}</strong> <span class="ac-muted">${escapeHtml(x.year)}</span></div>
    </div>
  `).join('');
  box.style.display = 'block';

  box.querySelectorAll('.ac-item').forEach(el=>{
    const pickHandler = (ev)=>{
      ev?.preventDefault?.();
      ev?.stopPropagation?.();
      const i = Number(el.getAttribute('data-i'));
      onPick(items[i]);
      hideAc(id);
    };
    el.addEventListener('pointerdown', pickHandler, {passive:false});
    el.addEventListener('touchstart', pickHandler, {passive:false});
    el.addEventListener('click', pickHandler);
  });
}
function bindAutocomplete(id){
  const input = document.getElementById(id);
  const box = document.getElementById(`ac-${id}`);
  if(!input || !box) return;

  let composing = false;
  input.addEventListener('compositionstart', ()=>{ composing=true; });
  input.addEventListener('compositionend', ()=>{ composing=false; });

  const doSearch = debounce(async ()=>{
    if(composing) return;
    if(document.activeElement !== input) return;

    const q = (input.value || '').trim();
    if(q.length < 3){ hideAc(id); return; }

    const hits = await tmdbSearchMovies(q, 8);
    if(document.activeElement !== input) return;

    showAc(id, hits, (pick)=>{
      input.value = pick.year ? `${pick.title} (${pick.year})` : pick.title;
      input.dispatchEvent(new Event('input', {bubbles:true}));
      input.dispatchEvent(new Event('change', {bubbles:true}));
    });
  }, 380);

  input.addEventListener('input', doSearch);
  input.addEventListener('keydown', (e)=>{ if(e.key === 'Escape') hideAc(id); });
  input.addEventListener('blur', ()=>{ setTimeout(()=>hideAc(id), 150); });
}
document.addEventListener('click', (e)=>{
  if (e.target?.closest?.('.ac-wrap')) return;
  ['w1','w2','w3','w4','w5','suggested'].forEach(hideAc);
});

// ===== Wishlist autosave + reorder =====
const WishlistAutoSave = {
  timer: null,
  delayMs: 1600,
  applying: false,
  lastSigByPerson: Object.create(null),

  sig(person){
    const v = (id)=> (document.getElementById(id)?.value || '').trim();
    return [person, v('w1'), v('w2'), v('w3'), v('w4'), v('w5')].join('␟');
  },

  schedule(reason=''){
    if(this.applying || !IS_AUTHED) return;
    clearTimeout(this.timer);
    this.timer = setTimeout(()=>this.commit(reason), this.delayMs);
  },

  commit(reason=''){
    if(this.applying || !IS_AUTHED) return;
    const person = $('#who')?.value || '';
    if(!person) return;

    const sig = this.sig(person);
    if(this.lastSigByPerson[person] === sig) return;

    const hasAny = sig.split('␟').slice(1).some(x=>x && x.length);
    if(!hasAny) return;

    this.lastSigByPerson[person] = sig;

    const body = {
      person,
      R1: $('#w1').value, R2: $('#w2').value, R3: $('#w3').value, R4: $('#w4').value, R5: $('#w5').value,
    };

    // Optimistisk cache
    Cache.set(`api_getWishlist_v1_${person}`, {savedAt: Date.now(), data: {ok:true, ...body}});

    if(reason && reason !== 'skriver'){
      setStatus(true, `lista autosparad (${reason}), synkar…`);
    }
    enqueueAndSync('saveWishlist', body);
  }
};

function updateWishlistMoveButtons(){
  document.querySelectorAll('[data-move][data-i]').forEach(btn=>{
    const i = Number(btn.getAttribute('data-i'));
    const dir = btn.getAttribute('data-move');
    btn.disabled = !IS_AUTHED || (dir === 'up' && i === 1) || (dir === 'down' && i === 5);
  });
}
async function refreshWishlistMetas(indices){
  const tasks = [];
  for (const i of indices){
    const q = ($(`#w${i}`)?.value || '').trim();
    const infoId = `w${i}-info`;
    const infoEl = document.getElementById(infoId);
    if(!q){ if(infoEl) infoEl.innerHTML = ''; continue; }
    tasks.push((async ()=>{
      const data = await smartLookup(q);
      renderOmdbInfo(infoId, data, q, {withStreaming:false});
    })());
  }
  await Promise.allSettled(tasks);
}
function swapWishlist(i, j){
  if(i === j) return;
  const a = document.getElementById(`w${i}`);
  const b = document.getElementById(`w${j}`);
  if(!a || !b) return;

  WishlistAutoSave.applying = true;
  const tmp = a.value; a.value = b.value; b.value = tmp;
  WishlistAutoSave.applying = false;

  refreshWishlistMetas([i,j]);
  WishlistAutoSave.schedule('ordning');
}
const wishlistMoveCooldown = { last: 0, delayMs: 450 };
document.addEventListener('click', (e)=>{
  const btn = e.target?.closest?.('[data-move][data-i]');
  if(!btn) return;
  if(!IS_AUTHED) return;

  const now = Date.now();
  if(now - wishlistMoveCooldown.last < wishlistMoveCooldown.delayMs) return;
  wishlistMoveCooldown.last = now;

  const i = Number(btn.getAttribute('data-i'));
  const dir = btn.getAttribute('data-move');
  if(dir === 'up' && i > 1) swapWishlist(i, i-1);
  if(dir === 'down' && i < 5) swapWishlist(i, i+1);
});

// ===== Actions =====
async function saveMyList(){
  if(!IS_AUTHED) return;
  const person = $('#who')?.value || '';
  const body = { person, R1:$('#w1').value, R2:$('#w2').value, R3:$('#w3').value, R4:$('#w4').value, R5:$('#w5').value };

  Cache.set(`api_getWishlist_v1_${person}`, {savedAt: Date.now(), data: {ok:true, ...body}});
  setStatus(true, 'lista sparad (lokalt), synkar…');

  enqueueAndSync('saveWishlist', body);
  $('#wishlistCol')?.classList.add('flash');
  setTimeout(()=>$('#wishlistCol')?.classList.remove('flash'), 700);
}

async function skipNext(){
  if(!IS_AUTHED) return;
  setStatus(true, 'hoppar över (synkar)…');
  enqueueAndSync('skipNext', {});
  scheduleSoftReload();
}

async function jumpToSelected(){
  if(!IS_AUTHED) return;
  const target = ($('#jumpTo')?.value || '').trim();
  if(!target) return;

  const steps = stepsToPerson(target);
  if(steps === 0){
    setStatus(true, 'redan på tur.');
    return;
  }

  setStatus(true, `byter tur → ${target} (synkar ${steps} steg)…`);

  // Optimistiskt UI
  $('#nextName').value = target;
  $('#suggested').value = '';
  setSuggestedEditable(true);
  $('#suggested-info').innerHTML = '';

  // Uppdatera cache getCurrent
  try{
    const curKey = 'api_getCurrent_v1';
    const cached = Cache.get(curKey);
    if(cached?.data?.ok){
      cached.data.next = target;
      cached.data.suggestion = '';
      Cache.set(curKey, {savedAt: Date.now(), data: cached.data, fp: cached.fp});
    }
  }catch{}

  for(let i=0;i<steps;i++) enqueueAndSync('skipNext', {});
  updateJumpOptions({preserveSelection:true, forceDefault:false});
  scheduleSoftReload();
}

async function saveNight(){
  if(!IS_AUTHED) return;

  const { block, snap } = NightSaveGuard.shouldBlockSave();

  if(!snap.who || !snap.film){
    NightSaveGuard.unlockButton();
    return setStatus(false,'saknar “Nästa i tur” eller film');
  }
  if(block){
    NightSaveGuard.lockButton('Kväll redan sparad');
    return setStatus(true, 'Redan sparad (ändra poäng/kommentar/film för att spara igen).');
  }

  NightSaveGuard.lockButton('Sparar…');

  setStatus(true, 'sparar kväll (synkar)…');

  // scores som objekt (backend kan acceptera object eller JSON-sträng; vi skickar object)
  const scores = {};
  for(const p of PEOPLE){
    scores[p] = ($('#s-'+p)?.value || '').trim();
  }

  enqueueAndSync('saveNight', { who: snap.who, film: snap.film, comment: snap.comment, scores });
  NightSaveGuard.markSaved(snap);

  // Optimistiskt nästa
  const idx = PEOPLE.indexOf(snap.who);
  const optimisticNext = (idx >= 0) ? PEOPLE[(idx + 1) % PEOPLE.length] : '';
  $('#nextName').value = optimisticNext;
  $('#suggested').value = '';
  setSuggestedEditable(true);
  $('#suggested-info').innerHTML = '';
  $('#comment').value = '';
  updateJumpOptions();

  // cache getCurrent
  try{
    const curKey = 'api_getCurrent_v1';
    const cached = Cache.get(curKey);
    if(cached?.data?.ok){
      cached.data.next = optimisticNext;
      cached.data.suggestion = '';
      Cache.set(curKey, {savedAt: Date.now(), data: cached.data, fp: cached.fp});
    }
  }catch{}

  scheduleSoftReload();
  setTimeout(()=>NightSaveGuard.lockButton('Kväll sparad'), 400);
}

function bindLookupUI(){
  document.querySelectorAll('button[data-lookup]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const id = btn.getAttribute('data-lookup');
      const q  = document.getElementById(id)?.value || '';
      const data = await smartLookup(q);
      renderOmdbInfo(`${id}-info`, data, q, {withStreaming: id === 'suggested'});
    });
  });

  ['w1','w2','w3','w4','w5','suggested'].forEach(id=>{
    const el = document.getElementById(id);
    if(!el) return;

    el.addEventListener('keydown', async (e)=>{
      if(e.key === 'Enter'){
        e.preventDefault();
        const data = await smartLookup(el.value);
        renderOmdbInfo(`${id}-info`, data, el.value, {withStreaming: id === 'suggested'});
      }
    });

    el.addEventListener('change', async ()=>{
      const data = await smartLookup(el.value);
      renderOmdbInfo(`${id}-info`, data, el.value, {withStreaming: id === 'suggested'});
      if(id === 'suggested') NightSaveGuard.unlockButton();
    });
  });
}

// ===== UI bind =====
function getParam(name){ return new URLSearchParams(location.search).get(name); }

function initUI(){
  $('#appVersion').textContent = APP_VERSION;

  // people
  $('#who').innerHTML = PEOPLE.map(p=>`<option value="${escapeHtml(p)}">${escapeHtml(p)}</option>`).join('');
  const urlWho = getParam('who');
  const savedWho = lsGet(LS.who);
  const fallbackWho = 'Lars';
  const initialWho = [urlWho, savedWho, fallbackWho].find(w => PEOPLE.includes(w)) || PEOPLE[0];
  $('#who').value = initialWho;
  if(!savedWho) lsSet(LS.who, initialWho);

  // theme
  $('#theme').value = lsGet(LS.theme) || 'auto';
  applyTheme();

  // saved pw/token/keys
  $('#pwInput').value = getSavedPw();
  $('#backendToken').value = getSavedToken();
  $('#tmdbKey').value = getKey('tmdb');
  $('#omdbKey').value = getKey('omdb');
  $('#watchmodeKey').value = getKey('watchmode');

  // scores UI
  buildScoresUI();

  // initial authed false
  setAuthedUI(false);
  setStatus(true, 'Init…');

  // disable inputs until authed
  updateWishlistMoveButtons();
  updateJumpOptions({preserveSelection:false, forceDefault:true});
}

function bindUI(){
  // theme
  $('#theme').addEventListener('change', ()=>{
    lsSet(LS.theme, $('#theme').value);
    applyTheme();
  });

  // who
  $('#who').addEventListener('change', ()=>{
    lsSet(LS.who, $('#who').value);
    if(IS_AUTHED) loadMyList({useCache:true}).catch(()=>{});
  });

  // toggle pw
  $('#togglePw').addEventListener('click', ()=>{
    const inp = $('#pwInput');
    const btn = $('#togglePw');
    const show = inp.type === 'password';
    inp.type = show ? 'text' : 'password';
    btn.textContent = show ? 'Dölj' : 'Visa';
  });

  // login
  $('#loginBtn').addEventListener('click', doLogin);
  $('#pwInput').addEventListener('keydown', (e)=>{ if(e.key === 'Enter') doLogin(); });

  // debug keys save-on-blur
  $('#backendToken').addEventListener('blur', ()=> setSavedToken($('#backendToken').value));
  $('#tmdbKey').addEventListener('blur', ()=> lsSet(LS.tmdb, $('#tmdbKey').value.trim()));
  $('#omdbKey').addEventListener('blur', ()=> lsSet(LS.omdb, $('#omdbKey').value.trim()));
  $('#watchmodeKey').addEventListener('blur', ()=> lsSet(LS.watchmode, $('#watchmodeKey').value.trim()));

  // copy debug
  $('#copyDebug').addEventListener('click', async ()=>{
    const txt = $('#debugPre').textContent || '';
    try{ await navigator.clipboard.writeText(txt); setStatus(true,'Felsökning kopierad'); }
    catch{ setStatus(false,'Kunde inte kopiera (markera texten manuellt)'); }
  });

  // advanced
  $('#toggleAdvanced').addEventListener('click', ()=>{
    if(!IS_AUTHED) return;
    const row = $('#advancedRow');
    const on = row.style.display !== 'none';
    row.style.display = on ? 'none' : 'flex';
    if(!on) updateJumpOptions({preserveSelection:false, forceDefault:true});
  });
  $('#jumpTo').addEventListener('change', ()=>{
    const target = $('#jumpTo')?.value || '';
    $('#doJump').disabled = !IS_AUTHED || (stepsToPerson(target) === 0);
  });
  $('#doJump').addEventListener('click', async ()=>{
    if(!IS_AUTHED) return;
    const btn = $('#doJump');
    if(btn.disabled) return;
    btn.disabled = true;
    btn.textContent = 'Byter…';
    try{ await jumpToSelected(); }
    finally{
      setTimeout(()=>{
        btn.textContent = 'Byt tur';
        updateJumpOptions({preserveSelection:true, forceDefault:false});
      }, 800);
    }
  });

  // save night
  $('#saveNight').addEventListener('click', saveNight);

  // unlock save-night when relevant changes
  $('#comment')?.addEventListener('input', ()=>NightSaveGuard.unlockButton());
  $$('.score-select').forEach(sel=> sel.addEventListener('change', ()=>NightSaveGuard.unlockButton()));
  $('#suggested')?.addEventListener('input', ()=>NightSaveGuard.unlockButton());

  // scores: direct save (queued)
  $$('.score-select').forEach(sel=>{
    sel.addEventListener('change', ()=>{
      if(!IS_AUTHED) return;
      const who = sel.id.replace('s-','');
      const val = (sel.value || '').trim();

      // optimistic cache getCurrent
      try{
        const curKey = 'api_getCurrent_v1';
        const cached = Cache.get(curKey)?.data;
        if(cached?.ok){
          cached.scores = cached.scores || {};
          cached.scores[who] = val;
          Cache.set(curKey, {savedAt: Date.now(), data: cached, fp: Cache.get(curKey)?.fp});
        }
      }catch{}

      setStatus(true, `poäng sparad för ${who} (synkar)…`);
      enqueueAndSync('saveScores', { scores: { [who]: val } });
    });
  });

  // wishlist load/save
  $('#loadList').addEventListener('click', async ()=>{
    if(!IS_AUTHED) return;
    setStatus(true,'Laddar…');
    try{ await loadMyList({useCache:true}); setStatus(true,'Redo'); }
    catch(e){ setStatus(false, e?.message || 'Fel'); }
  });
  $('#saveList').addEventListener('click', async ()=>{
    if(!IS_AUTHED) return;
    setStatus(true,'Sparar…');
    try{ await saveMyList(); setStatus(true,'Lista sparad'); }
    catch(e){ setStatus(false, e?.message || 'Fel'); }
  });

  // autosave wishlist
  ['w1','w2','w3','w4','w5'].forEach(id=>{
    const el = document.getElementById(id);
    if(!el) return;
    el.addEventListener('input', ()=>WishlistAutoSave.schedule('skriver'));
    el.addEventListener('blur',  ()=>WishlistAutoSave.commit('klar'));
  });

  // lookup
  bindLookupUI();

  // autocomplete
  ['w1','w2','w3','w4','w5','suggested'].forEach(bindAutocomplete);
}

async function boot(){
  initUI();
  bindUI();

  // flush queue if any
  if(pendingCount() > 0) scheduleFlush(sendJobToServer, 200);

  setStatus(true, 'Laddar…');

  // försök “auto-login” (om pw/token finns)
  const ok = await tryAutoLogin();
  if(ok){
    setAuthedUI(true);
    try{
      await loadAll({useCache:true});
      setStatus(true, 'Redo');
      // dölj inloggningsdetalj om den var öppen
      try{ $('#loginDetails').open = false; }catch{}
      updateWishlistMoveButtons();
      return;
    }catch{
      // om något faller, låt användaren logga in manuellt
    }
  }

  setAuthedUI(false);
  updateWishlistMoveButtons();

  // vi kan fortfarande visa cached data utan auth (om det finns), men knapparna är låsta
  try{
    await loadAll({useCache:true});
    setStatus(false, 'Logga in för att spara/ändra');
  }catch{
    setStatus(false, 'Logga in för att fortsätta');
  }
}

boot();
