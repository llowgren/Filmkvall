<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Filmkväll</title>

  <link rel="icon" type="image/png" href="Logo.PNG">
  <link rel="stylesheet" href="./styles.css">
</head>

<body>
  <div class="wrap">
    <header class="hero">
      <img id="logoImg" src="Logo.PNG" alt="Filmkväll logotyp" class="hero-logo" />
      <h1 class="hero-title">Filmkväll</h1>
      <div class="muted hero-version">Kodversion: <span id="appVersion">–</span></div>
    </header>

    <!-- Boot-logg (visas om något går fel) -->
    <div class="card" id="bootCard">
      <h3>Boot</h3>
      <pre id="bootlog" style="white-space:pre-wrap;margin:0"></pre>
    </div>

    <film-login></film-login>
    <film-now></film-now>
    <film-wishlist></film-wishlist>
    <film-tops></film-tops>
    <film-history></film-history>
    <film-system></film-system>
  </div>

  <script type="module">
    const logEl = document.getElementById('bootlog');
    const log = (m)=>{ logEl.textContent += m + "\n"; };

    // version
    const verEl = document.getElementById('appVersion');
    if (verEl) verEl.textContent = document.lastModified || '–';

    async function mustImport(path){
      try{
        await import(path);
        log("OK  " + path);
      }catch(e){
        log("FEL " + path);
        log(String(e?.message || e));
        throw e;
      }
    }

    try{
      log("Startar imports…");
      await mustImport('./store.js');
      await mustImport('./film-login.js');   // viktigt: sätter auth i store
      await mustImport('./api.js');

      await mustImport('./film-now.js');
      await mustImport('./film-wishlist.js');
      await mustImport('./film-tops.js');
      await mustImport('./film-history.js');
      await mustImport('./film-system.js');

      log("KLAR ✅");
    }catch(_){
      log("Stopp pga fel ovan.");
    }
  </script>
</body>
</html>
