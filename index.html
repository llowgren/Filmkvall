  <style>
    :root{
      --bg:#0f1116; --panel:#161a22; --text:#e6e8ee; --muted:#9aa3b2;
      --accent:#f6c247; --accent-weak:#ffe399; --ok:#2ea86b; --err:#e5534b;
      --input:#0f1116; --border:#2a3140; --btn:#1f2533; --btn-text:#e6e8ee;
      --pill-bg:#1f2533;
    }
    [data-theme="light"]{
      --bg:#f6f7fb; --panel:#ffffff; --text:#151823; --muted:#5b6475;
      --input:#ffffff; --border:#dfe3ee; --btn:#eef0f6; --btn-text:#111826;
      --pill-bg:#f1f3f8;
    }
    *{box-sizing:border-box}
    body{background:var(--bg); color:var(--text); font:16px/1.45 system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial; margin:0}
    .wrap{max-width:980px; margin:24px auto; padding:0 16px;}
    h1{font-size:26px; margin:0 0 8px}
    h3{margin:0 0 10px}
    .muted{color:var(--muted)}
    .card{background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:16px; margin:14px 0}
    .row{display:flex; gap:12px; flex-wrap:wrap}
    .col{flex:1 1 220px; min-width:220px}
    label{display:block; font-size:13px; color:var(--muted); margin:0 0 6px}
    input,select,textarea{
      width:100%; padding:10px 12px; border-radius:10px;
      border:1px solid var(--border); background:var(--input); color:var(--text);
      outline:none;
    }
    button{
      background:var(--btn); color:var(--btn-text); cursor:pointer;
      border:1px solid var(--border); padding:8px 12px; border-radius:9px; font-size:14px;
    }
    .primary{background:var(--accent); color:#1b1f2a; border-color:#c8a73a}
    .ghost{background:transparent}
    .ok{color:var(--ok)} .err{color:var(--err)}
    .pill{display:inline-block; padding:6px 10px; border-radius:999px; font-size:13px; background:var(--pill-bg); border:1px solid var(--border)}
    #apiStatus.pill{padding:8px 12px; display:inline-block; line-height:1.2}
    .right{margin-left:auto}
    .flash{animation:flash 700ms ease}
    @keyframes flash{0%{box-shadow:0 0 0 0 rgba(246,194,71,0)}40%{box-shadow:0 0 0 6px rgba(246,194,71,.25)}100%{box-shadow:0 0 0 0 rgba(246,194,71,0)}}

    /* Önskelista i kolumn */

    /* Topplistor i två kolumner (1 kolumn på smal skärm) */

    #tops .col{ display:flex; flex-direction:column; gap:6px; }
    @media (max-width:640px){ #tops .row{ grid-template-columns:1fr; } }
/* Autocomplete */
.ac-wrap{ position:relative; }
.ac-list{
  position:absolute; left:0; right:0; top:100%;

  background:var(--panel);
  border:1px solid var(--border);
  border-radius:10px;
  margin-top:6px;

.ac-item{

}
.ac-item:first-child{ border-top:none; }
.ac-item:hover{ filter:brightness(1.08); }
.ac-muted{ color:var(--muted); font-size:12px; }

}
button.primary:disabled{

<script>
/* ===== Spara-kväll skydd (front-end) ===== */
const NightSaveGuard = {
  storageKey: 'filmkvall_lastNightSave_v1',
  state: { locked:false, reason:'' },

  getLocalDateISO(){
    const d = new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,'0');
    const day = String(d.getDate()).padStart(2,'0');
    return `${y}-${m}-${day}`;
  },

  normFilm(s){
    return String(s||'')
      .trim()
      .toLowerCase()
      .normalize('NFKD').replace(/[\u0300-\u036f]/g,'')
      .replace(/\s+/g,' ');
  },

  getScoresObj(){
    const scores = {};
    for(const p of PEOPLE){
      scores[p] = (document.getElementById(`s-${p}`)?.value || '').trim();
    }
    return scores;
  },

  snapshot(){
    const who = (document.getElementById('nextName')?.value || '').trim();
    const film = (document.getElementById('suggested')?.value || '').trim();
    const comment = (document.getElementById('comment')?.value || '').trim();

    const dateISO = this.getLocalDateISO();
    const key = `${dateISO}::${who}::${this.normFilm(film)}`;

    const scoresHash = JSON.stringify(this.getScoresObj());
    const commentHash = comment; // enkel, räcker

    return { dateISO, who, film, comment, key, scoresHash, commentHash };
  },

  read(){
    try{ return JSON.parse(localStorage.getItem(this.storageKey) || 'null'); }
    catch{ return null; }
  },

  write(obj){
    try{ localStorage.setItem(this.storageKey, JSON.stringify(obj)); } catch {}
  },

  shouldBlockSave(){
    const snap = this.snapshot();
    const last = this.read();
    if(!last) return { block:false, snap };

    const sameKey = last.key === snap.key;
    const sameScores = last.scoresHash === snap.scoresHash;
    const sameComment = (last.commentHash || '') === (snap.commentHash || '');

    // Blockera bara om det är “exakt samma kväll” OCH inget har ändrats
    if(sameKey && sameScores && sameComment){
      return { block:true, snap };
    }
    return { block:false, snap };
  },

  lockButton(msg){
    const btn = document.getElementById('saveNight');
    if(!btn) return;
    btn.disabled = true;
    btn.textContent = msg || 'Kväll sparad';
  },

  unlockButton(){
    const btn = document.getElementById('saveNight');
    if(!btn) return;
    btn.disabled = false;
    btn.textContent = 'Spara kväll';
  },

  markSaved(snap){
    this.write({
      key: snap.key,
      scoresHash: snap.scoresHash,
      commentHash: snap.commentHash,
      savedAt: Date.now()
    });
  }
};

const API = 'https://script.google.com/macros/s/AKfycby82y98CZDZc4d9tSdyi-dovoHf84sx4LC0RLQ-SosU44_BlNPzhsqWhqkNHU5Vsw7hrA/exec';

/* ===== Snabb cache + bakgrundssynk (SWR) ===== */
const Cache = {
  get(key){
    try { return JSON.parse(localStorage.getItem(key) || "null"); } catch { return null; }
  },
  set(key, value){
    try { localStorage.setItem(key, JSON.stringify(value)); } catch {}
  },
  del(key){
    try { localStorage.removeItem(key); } catch {}
  }
};

function setSuggestedEditable(isEditable){
  const el = document.getElementById('suggested');
  if(!el) return;
  el.readOnly = !isEditable;
  el.placeholder = isEditable ? 'Skriv film här om listan är tom…' : '';
}
// SWR: returnera cache direkt, refresh i bakgrunden och kalla onFresh vid förändring
async function fetchJsonSWR({ key, url, maxAgeMs=30_000, onFresh, fingerprint }){
  const cached = Cache.get(key);
  const now = Date.now();

  if (cached?.data){
    if (!cached.savedAt || (now - cached.savedAt) > maxAgeMs) refresh();
    return cached.data;
  }

  const data = await fetch(url, {cache:'no-store'}).then(r=>r.json());
  const fp0 = safeFp(data);
  Cache.set(key, {savedAt: Date.now(), data, fp: fp0});
  return data;

  function safeFp(x){
    try{
      if (typeof fingerprint === 'function') return String(fingerprint(x));
    }catch(_){ }

    // billig standard-fingerprint (undviker JSON.stringify på hela objekt)
    try{
      if (x == null) return 'null';
      if (typeof x !== 'object') return String(x);
      if ('updatedAt' in x) return 'u:' + String(x.updatedAt);
      if ('ts' in x) return 't:' + String(x.ts);
      if (Array.isArray(x)) return 'a:' + x.length;
      if ('rows' in x && Array.isArray(x.rows)){
        const r = x.rows;
        const last = r[0] || r[r.length-1] || {};
        return `rows:${r.length}:${last['Datum']||''}:${last['Film']||''}`;
      }
      if ('bestFilms' in x || 'bestPickers' in x){
        const bf = Array.isArray(x.bestFilms) ? x.bestFilms[0] : null;
        const bp = Array.isArray(x.bestPickers) ? x.bestPickers[0] : null;
        return `tops:${x.ok?'1':'0'}:${bf?.film||''}:${bf?.avg||''}:${bp?.who||''}:${bp?.avg||''}`;
      }
      if ('R1' in x || 'R2' in x || 'R3' in x || 'R4' in x || 'R5' in x){
        return `wl:${x.ok?'1':'0'}:${x.R1||''}:${x.R2||''}:${x.R3||''}:${x.R4||''}:${x.R5||''}`;
      }
      return 'o:' + Object.keys(x).length;
    }catch(_){
      return 'x';
    }
  }

  async function refresh(){
    try{
      const fresh = await fetch(url, {cache:'no-store'}).then(r=>r.json());
      const fpNew = safeFp(fresh);
      const fpOld = cached?.fp ?? safeFp(cached?.data);

      Cache.set(key, {savedAt: Date.now(), data: fresh, fp: fpNew});

      if (fpOld !== fpNew) onFresh?.(fresh);
    }catch(_){ }
  }
}


/* ===== Lokal spara-kö (optimistisk) ===== */
const SaveQueue = {
  key: "filmkvall_savequeue_v1",
  read(){ return Cache.get(this.key) || []; },
  write(q){ Cache.set(this.key, q); },
  enqueue(job){
    const q = this.read();
    q.push({ ...job, ts: Date.now() });
    this.write(q);
    updatePendingBadge();
  },
  async flush(flusher){
    const q = this.read();
    if(!q.length) return;

    const remaining = [];
    for (let i=0;i<q.length;i++){
      const job = q[i];
      try{
        await flusher(job);
      }catch(e){
        remaining.push(job, ...q.slice(i+1));
        this.write(remaining);
        updatePendingBadge();
        throw e;
      }
    }
    this.write([]);
    updatePendingBadge();
  }
};

let flushTimer = null;
function scheduleFlush(flusher, delayMs=700){
  clearTimeout(flushTimer);
  flushTimer = setTimeout(async ()=>{
    try{
      await SaveQueue.flush(flusher);
      // när vi lyckas: uppdatera “server-data” i bakgrunden
      scheduleSoftReload();
    }catch(_){ }
  }, delayMs);
}
window.addEventListener("online", ()=>scheduleFlush(sendJobToServer, 200));
document.addEventListener("visibilitychange", ()=>{
  if(document.visibilityState === "visible") scheduleFlush(sendJobToServer, 200);
});

function pendingCount(){
  return (SaveQueue.read() || []).length;
}
function updatePendingBadge(){
  const el = document.getElementById('apiStatus');
  if(!el) return;
  const n = pendingCount();
  // Visa tyst indikator om det finns saker på kö (utan att störa din OK/Fel-text för mycket)
  if(n > 0){
    el.textContent = el.textContent.replace(/\s*\(\d+ i kö\)\s*$/,'') + ` (${n} i kö)`;
  }else{
    el.textContent = el.textContent.replace(/\s*\(\d+ i kö\)\s*$/,'');
  }
}

// Gör en “mjuk reload” av serverdata snart (men låt cache visa direkt)
let softReloadTimer = null;
function scheduleSoftReload(){
  clearTimeout(softReloadTimer);
  softReloadTimer = setTimeout(()=>loadAll({useCache:true}), 400);
}

/* ===== Hjälpare ===== */
const $  = (s)=>document.querySelector(s);
const $$ = (s)=>document.querySelectorAll(s);
const qs = (o)=> new URLSearchParams(o).toString();
const apiUrl = (action, params={}) => `${API}?${qs({action, pw:PW, ...params})}`;
const api = (action, params={}) =>
  fetch(apiUrl(action, params), {cache:'no-store'}).then(r=>r.json());

const round1 = (x)=>Math.round((Number(x)||0)*10)/10;
const setStatus=(ok,msg)=>{
  const el=$('#apiStatus');
  const base = (ok?'OK – ':'Fel – ')+msg;
  el.textContent = base + (pendingCount() ? ` (${pendingCount()} i kö)` : '');

function escapeHtml(s){ return String(s).replace(/[&<>"']/g, m=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m])); }

/* ===== Watchmode-ID cache (minne) ===== */
const _wmIdCache = new Map();
async function getWmIdCached(imdbID){
  if(_wmIdCache.has(imdbID)) return _wmIdCache.get(imdbID);
  const id = await wmTitleIdFromImdb(imdbID);
  _wmIdCache.set(imdbID, id);

/* ===== Tema (Auto/Ljust/Mörkt) ===== */
function applyTheme(){
  const sel = $('#theme').value;
  const root = document.documentElement;
  let mode = sel;
  if (sel === 'auto'){
    mode = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
  }
  if (mode === 'light') root.setAttribute('data-theme', 'light');
  else root.removeAttribute('data-theme');
  root.style.colorScheme = (mode === 'light') ? 'light' : 'dark';
}
const _mqlLight = window.matchMedia('(prefers-color-scheme: light)');
const _onSchemeChange = () => { if ($('#theme')?.value === 'auto') applyTheme(); };
_mqlLight.addEventListener?.('change', _onSchemeChange);
_mqlLight.addListener?.(_onSchemeChange);

/* ===== OMDb/TMDb helpers ===== */
function imdbUrlFrom(j){ return j?.imdbID ? `https://www.imdb.com/title/${j.imdbID}/` : ''; }
function norm(s){ return String(s||'').toLowerCase().normalize('NFKD').replace(/[\u0300-\u036f]/g,''); }
function normLite(s){
  return String(s||'').toLowerCase()
    .normalize('NFKD')
    .replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-z0-9åäö\s:!?.\-]/g,'')
    .trim();
}
async function tmdbSearchMovie(query){
  if(!TMDB_KEY || !query) return null;
  const url = `${TMDB_URL}/search/movie?api_key=${encodeURIComponent(TMDB_KEY)}&language=sv-SE&include_adult=false&query=${encodeURIComponent(query)}`;
  const r = await fetch(url, {cache:'no-store'}).catch(()=>null);
  if(!r || !r.ok) return null;
  const j = await r.json();
  if(!Array.isArray(j?.results) || !j.results.length) return null;

  const qn = normLite(query);
  const scored = j.results.map(it=>{
    const tn = normLite(it.title || it.original_title);
    let score = 0;
    if(tn === qn) score = 100;
    else if(tn.startsWith(qn)) score = 80;
    else if(tn.includes(qn)) score = 60;
    score += Math.min(20, (it.vote_count||0)/1000);
    return {score, it};
  }).sort((a,b)=>b.score-a.score);
  return scored[0].it;
}
async function tmdbExternalIds(movieId){
  if(!TMDB_KEY || !movieId) return null;
  const url = `${TMDB_URL}/movie/${movieId}/external_ids?api_key=${encodeURIComponent(TMDB_KEY)}`;
  const r = await fetch(url, {cache:'no-store'}).catch(()=>null);
  if(!r || !r.ok) return null;
  return await r.json();
}
async function tmdbLookup(query){
  const hit = await tmdbSearchMovie(query);
  if(!hit) return null;

  let imdbID = null;
  try{
    const ids = await tmdbExternalIds(hit.id);
    imdbID = ids?.imdb_id || null;
  }catch(_){ }

  const poster = hit.poster_path ? `https://image.tmdb.org/t/p/w92${hit.poster_path}` : 'N/A';
  const year = (hit.release_date||'').slice(0,4) || '';

  return {
    Title: hit.title || hit.original_title || '',
    Year: year,
    Poster: poster,
    imdbID: imdbID || '',
    imdbRating: '-',
  };
}

async function omdbLookup(query){
  if(!query) return null;
  let q = query.trim(), year = null;
  const mYear = q.match(/\((\d{4})\)$/);
  if(mYear){ year = mYear[1]; q = q.replace(/\s*\(\d{4}\)\s*$/,''); }

  const tt = (q.match(/tt\d{7,}/i) || q.match(/imdb\.com\/title\/(tt\d+)/i));
  if(tt){
    const id = (tt[1] || tt[0]).replace(/^.*(tt\d+).*$/,'$1');
    const r = await fetch(`${OMDB_URL}?apikey=${OMDB_KEY}&i=${id}&plot=short`,{cache:'no-store'}).catch(()=>null);
    const j = r? await r.json():null;
    if(j && j.Response!=='False') return j;
    return null;
  }

  try{
    const r1 = await fetch(`${OMDB_URL}?apikey=${OMDB_KEY}&t=${encodeURIComponent(q)}${year?`&y=${year}`:''}&type=movie&plot=short`,{cache:'no-store'});
    const j1 = await r1.json();
    if(j1 && j1.Response!=='False') return j1;
  }catch(_){ }
  try{
    const r2 = await fetch(`${OMDB_URL}?apikey=${OMDB_KEY}&s=${encodeURIComponent(q)}&type=movie`,{cache:'no-store'});
    const j2 = await r2.json();
    if(j2 && j2.Response!=='False' && Array.isArray(j2.Search) && j2.Search.length){
      const nq = norm(q);
      const scored = j2.Search
        .map(it=>({ it, nt:norm(it.Title), y:it.Year }))
        .map(o=>{
          let score = 0;
          if(o.nt === nq) score = 3;
          else if(o.nt.startsWith(nq)) score = 2;
          else if(o.nt.includes(nq)) score = 1;
          if(year && String(o.y) === String(year)) score += 0.5;
          return {score, it:o.it};
        })
        .sort((a,b)=> b.score - a.score);
      return scored[0]?.it ? await omdbLookup(scored[0].it.Title) : null;
    }
  }catch(_){ }
  return null;
}

/* ===== Metadata-cache lokalt (för OMDb/TMDb/Watchmode) ===== */
async function getMetaCached(key, fetcher, ttlMs){
  const cached = Cache.get(key);
  const now = Date.now();
  if(cached?.data && cached.savedAt && (now - cached.savedAt) < ttlMs) return cached.data;
  const data = await fetcher();
  Cache.set(key, {savedAt: now, data});
  return data;
}

/* ===== Smart lookup (TMDb först, sedan OMDb) med lokal cache ===== */
async function smartLookup(query){
  if(!query) return null;
  const q = query.trim();
  const cacheKey = `smartLookup_v1_${normLite(q)}`;

  return getMetaCached(cacheKey, async ()=>{
    if(/\btt\d{7,}\b/i.test(q) || /imdb\.com\/title\/tt\d+/i.test(q)){
      const om = await omdbLookup(q);
      if(om) return om;
    }
    const tm = await tmdbLookup(q);
    if(tm){
      if(tm.imdbID) return tm;
      const tryOmdb = await omdbLookup(`${tm.Title} (${tm.Year||''})`);
      return tryOmdb || tm;
    }
    return await omdbLookup(q);
  }, 30*24*3600_000); // 30 dagar
}

/* ===== Watchmode ===== */
async function wmTitleIdFromImdb(imdbID){
  try{
    const u1 = `https://api.watchmode.com/v1/find/?apiKey=${WATCHMODE_KEY}&source=imdb&external_id=${encodeURIComponent(imdbID)}`;
    let r = await fetch(u1, {cache:'no-store'});
    if(r.ok){
      const j = await r.json();
      if(j && j.title_id) return j.title_id;
    }
    const u2 = `https://api.watchmode.com/v1/search/?apiKey=${WATCHMODE_KEY}&search_field=imdb_id&search_value=${encodeURIComponent(imdbID)}`;
    r = await fetch(u2, {cache:'no-store'});
    if(r.ok){
      const j = await r.json();
      const hit = Array.isArray(j?.title_results) ? j.title_results.find(t => String(t.imdb_id) === String(imdbID)) : null;
      if(hit?.id) return hit.id;
    }
  }catch(_){ }
  return null;
}

async function getStreamingInfo(imdbID) {
  if (!imdbID) return null;

  // Cache: 7 dagar per imdbID (sources kan ändras ibland)
  return getMetaCached(`wm_sources_${imdbID}`, async ()=>{
    try {
      const wmId = await getWmIdCached(imdbID);
      if (!wmId) return null;

      const url = `https://api.watchmode.com/v1/title/${wmId}/sources/?apiKey=${WATCHMODE_KEY}`;
      const res = await fetch(url, { cache: 'no-store' });
      const data = await res.json();
      if (!Array.isArray(data)) return null;

      const seen = new Set();
      const normalizeName = s => String(s || '')
        .replace(/\s*\(with Ads\)$/i, '')
        .replace(/\s+HD$/, '')
        .trim();

      const filtered = data
        .filter(s => s.type === 'sub' && s.name)
        .map(s => ({
          service: normalizeName(s.name),
          quality: (s.format === '4K' || s.format === 'HD') ? s.format : '',
          region: s.region || '',
          link: s.web_url || ''
        }))
        .filter(s => {
          const key = `${s.service}|${s.quality}|${s.region}`;
          if (seen.has(key)) return false;
          seen.add(key);
          return true;
        })
        .sort((a, b) => (a.service + a.region + a.quality).localeCompare(b.service + b.region + b.quality));

      return filtered.length ? filtered : null;
    } catch (e) {
      console.error('Watchmode sources error:', e);
      return null;
    }
  }, 7*24*3600_000);
}

/* ===== Rendera info ===== */
async function renderOmdbInfo(containerId, data, query, opts = {}) {
  const withStreaming = (opts.withStreaming !== false);
  const el = document.getElementById(containerId);
  if(!el) return;

  if(!data){
    el.innerHTML = `<div style="color:var(--muted)">Hittade inget för: ${escapeHtml(query||'')}</div>`;
    return;
  }

  const title  = escapeHtml(data.Title || '');
  const year   = escapeHtml(data.Year || '');
  const rating = escapeHtml(data.imdbRating || '-');
  const link   = imdbUrlFrom(data);
  const poster = (data.Poster && data.Poster !== 'N/A')
    ? `<img src="${data.Poster}" alt="poster">`
    : '';

  let streamingHtml = '';
  if (withStreaming && data.imdbID) {
    // Rendera direkt från cache om det finns, och uppdatera i bakgrunden
    const cacheKey = `wm_sources_${data.imdbID}`;
    const cached = Cache.get(cacheKey)?.data || null;

    if(cached && cached.length){
      const pills = cached.map(opt=>{
        const label = [opt.service, opt.quality ? ` ${opt.quality}` : '', opt.region ? ` · ${opt.region}` : ''].join('');
        const href = opt.link ? `href="${opt.link}" target="_blank" rel="noopener"` : '';
        return `<a ${href} class="pill" style="margin:2px; text-decoration:none">${label} (ingår)</a>`;
      }).join('');
      streamingHtml = `<div style="margin-top:8px"><strong>Tillgängligt i abonnemang (globalt):</strong><br>${pills}</div>`;
      // kicka bakgrundsuppdatering
      getStreamingInfo(data.imdbID).then(fresh=>{
        if(!fresh) return;
        const oldStr = JSON.stringify(cached);
        const newStr = JSON.stringify(fresh);
        if(oldStr !== newStr){
          // re-render bara den här rutan
          renderOmdbInfo(containerId, data, query);
        }
      });
    }else{
      streamingHtml = `<div style="margin-top:6px; color:var(--muted); font-size:12px">Hämtar streaming…</div>`;
      // hämta
      const options = await getStreamingInfo(data.imdbID);
      if (options && options.length > 0) {
        const pills = options.map(opt => {
          const label = [opt.service, opt.quality ? ` ${opt.quality}` : '', opt.region ? ` · ${opt.region}` : ''].join('');
          const href = opt.link ? `href="${opt.link}" target="_blank" rel="noopener"` : '';
          return `<a ${href} class="pill" style="margin:2px; text-decoration:none">${label} (ingår)</a>`;
        }).join('');
        streamingHtml = `<div style="margin-top:8px"><strong>Tillgängligt i abonnemang (globalt):</strong><br>${pills}</div>`;
      } else {
        streamingHtml = `<div style="margin-top:6px; color:var(--muted); font-size:12px">Inget abonnemang hittades just nu.</div>`;
      }
    }
  }

  el.innerHTML = `
    ${poster}
    <div>
      <strong>${title}</strong>${year ? ` (${year})` : ''}<br>
      IMDb ${rating}${link ? ` — <a href="${link}" target="_blank" rel="noopener">Öppna på IMDb</a>` : ''}
      ${streamingHtml}
    </div>`;
}

function apiSWR(action, params, {cacheKey, maxAgeMs, onFresh, fingerprint}){

/* ===== Ladda allt (med cache först) ===== */
async function loadAll({useCache=true}={}){
  try{
    const now = new Date().toLocaleTimeString('sv-SE', {hour:'2-digit', minute:'2-digit'});

    // 1) getCurrent
    const cur = useCache
      ? await apiSWR('getCurrent', {}, {
          cacheKey:'api_getCurrent_v1',
          maxAgeMs: 20_000,
          fingerprint: (j)=> `${j?.ok?'1':'0'}|${j?.next||''}|${j?.suggestion||''}|${PEOPLE.map(p=>j?.scores?.[p]??'').join(',')}`,
          onFresh: (fresh)=>applyCurrent(fresh, {quiet:true})
        })
      : await api('getCurrent');

    applyCurrent(cur, {quiet:true});

    // 2) wishlist för vald person
    await loadMyList({useCache});

    // 3) Topplistor
    if(useCache){
      const tops = await apiSWR('getTops', {limit:5}, {
        cacheKey:'api_getTops_v1_5',
        maxAgeMs: 5*60_000,
        fingerprint: (j)=>{
          const bf = (j?.bestFilms||[]).map(x=>`${x.film}:${x.avg}:${x.who}`).join('|');
          const bp = (j?.bestPickers||[]).map(x=>`${x.who}:${x.avg}:${x.n}`).join('|');
          return `${j?.ok?'1':'0'}|${bf}|${bp}`;
        },
        onFresh: (fresh)=>renderTops(fresh)
      });
      renderTops(tops);
    }else{
      renderTops(await api('getTops', {limit:5}));
    }

    // 4) Historik
    if(useCache){
      const hist = await apiSWR('getHistory', {limit:10}, {
        cacheKey:'api_getHistory_v1_10',
        maxAgeMs: 60_000,
        fingerprint: (j)=>{
          const r = j?.rows || [];
          const last = r[0] || r[r.length-1] || {};
          return `${j?.ok?'1':'0'}|${r.length}|${last['Datum']||''}|${last['Film']||''}`;
        },
        onFresh: (fresh)=>renderHistory(fresh)
      });
      renderHistory(hist);
    }else{
      renderHistory(await api('getHistory', {limit:10}));
    }

    // 5) OMDb för suggested (smartLookup + cache)
    await updateSuggestedInfo();

    setStatus(true, `API svarar – uppdaterat ${now}`);
  }catch(err){
    console.error('Fel i loadAll:', err);
    setStatus(false, 'Fel vid laddning');
  }
}

function applyCurrent(cur, {quiet=false}={}){
  if(!cur || !cur.ok){
    if(!quiet) setStatus(false, cur?.error || 'getCurrent');
    return;
  }

  $('#nextName').value = cur.next || '';

  const suggestedEl = document.getElementById('suggested');
  if (suggestedEl) {
    const serverSuggestion = (cur.suggestion || '').trim();

    const userTyped =
      !suggestedEl.readOnly &&
      (suggestedEl.value || '').trim().length > 0;

    if (!userTyped) {
      suggestedEl.value = serverSuggestion;
      setSuggestedEditable(serverSuggestion.length === 0); // tomt => skrivbart
    } else {
      setSuggestedEditable(true); // behåll skrivbart om användaren skriver
    }
  }

  if (cur.scores){
    for (const p of PEOPLE){
      const el = document.getElementById(`s-${p}`);
      if (el) el.value = cur.scores[p] ?? '';
    }
  }
}
function renderTops(tops){
  try{
    if (tops?.ok){
      const films = (tops.bestFilms||[]).map(x=>`<div class="pill">${escapeHtml(x.film)} — <strong>${escapeHtml(x.avg)}</strong> <span class="muted">(${escapeHtml(x.who)})</span></div>`).join('') || '–';
      const pickers = (tops.bestPickers||[]).map(x=>`<div class="pill">${escapeHtml(x.who)} — <strong>${escapeHtml(x.avg)}</strong> <span class="muted">(${escapeHtml(x.n)} filmer)</span></div>`).join('') || '–';
      $('#tops').innerHTML = `<div class="row"><div class="col"><label>Bästa filmer</label>${films}</div><div class="col"><label>Bästa väljare</label>${pickers}</div></div>`;
    } else {
      $('#tops').innerHTML = '<div class="muted">Kunde inte hämta topplistor.</div>';
    }
  }catch(_){ }
}

function renderHistory(hist){
  try{
    if (hist?.ok){
      const rows = (hist.rows||[]).map(r=>{
        const nums = PEOPLE.map(p=>Number(r[p])||0).filter(x=>x>0);
        const avg = nums.length? round1(nums.reduce((a,b)=>a+b,0)/nums.length) : '-';
        const per = PEOPLE.map(p=>`${p}: ${r[p]||'-'}`).join(' • ');
        return `<div class="pill" style="display:block;margin:6px 0;padding:10px 12px">
          <strong>${escapeHtml(r['Film']||'–')}</strong> — ${escapeHtml(r['Datum']||'')}
          <span class="muted"> (val: ${escapeHtml(r['Vem valde']||'-')}, Snitt: ${escapeHtml(avg)})</span><br/>
          <span class="muted">${escapeHtml(per)}</span></div>`;
      }).join('');
      $('#history').innerHTML = rows || 'Tomt.';
    } else {
      $('#history').innerHTML = '<div class="muted">Kunde inte hämta historik.</div>';
    }
  }catch(_){ }
}

/* ===== Önskelista (min) med cache + bakgrund ===== */
async function loadMyList({useCache=true}={}){
  const who = document.getElementById('who').value;

  const apply = async (j)=>{
    if(!j || !j.ok){ return; }
    document.getElementById('w1').value = j.R1 || '';
    document.getElementById('w2').value = j.R2 || '';
    document.getElementById('w3').value = j.R3 || '';
    document.getElementById('w4').value = j.R4 || '';
    document.getElementById('w5').value = j.R5 || '';
    // För att sidan ska kännas snabb: hämta metadata parallellt.
    const tasks = [];
    for (let i=1;i<=5;i++){
      const q = document.getElementById(`w${i}`).value;
      const infoEl = document.getElementById(`w${i}-info`);
      if(!q){ if(infoEl) infoEl.innerHTML=''; continue; }
      tasks.push((async ()=>{
        const data = await smartLookup(q);
        // Streaming för wishlist kan vara tungt: hoppa över här (du har IMDb-länk ändå)
        renderOmdbInfo(`w${i}-info`, data, q, {withStreaming:false});
      })());
    }
    await Promise.allSettled(tasks);
  };

  let j;
  if(useCache){
    j = await apiSWR('getWishlist', {person: who}, {
      cacheKey: `api_getWishlist_v1_${who}`,
      maxAgeMs: 30_000,
      fingerprint: (j)=> `${j?.ok?'1':'0'}|${j?.R1||''}|${j?.R2||''}|${j?.R3||''}|${j?.R4||''}|${j?.R5||''}`,
      onFresh: (fresh)=>apply(fresh)
    });
  }else{
    j = await api('getWishlist', {person: who});
  }
  if(!j?.ok){ setStatus(false, j?.error || 'getWishlist'); return; }
  await apply(j);
}

/* ===== Save-funktioner: lokalt först, server i bakgrunden ===== */
async function sendJobToServer(job){
  // dina API:er är GET med action/pw, så vi skickar samma sätt.
  // Vi tar hela job.payload och sprider in den i query string.
  const { action, payload } = job;
  const j = await api(action, payload || {});
  if(!j?.ok) throw new Error(j?.error || action);
  return j;
}

function enqueueAndSync(action, payload){
  SaveQueue.enqueue({action, payload});
  scheduleFlush(sendJobToServer, 700);
}

  // Direkt-spara poäng: lokalt först, synka sen
  document.querySelectorAll('.score-select').forEach(sel=>{
    sel.addEventListener('change', async ()=>{
      const who = sel.id.replace('s-','');
      const val = sel.value.trim(); // '' om "–"

      // Optimistiskt: uppdatera cache för getCurrent (så reload känns instant)
      const curKey = 'api_getCurrent_v1';
      const cached = Cache.get(curKey)?.data;
      if(cached?.ok){
        cached.scores = cached.scores || {};
        cached.scores[who] = val;
        Cache.set(curKey, {savedAt: Date.now(), data: cached});
      }

      setStatus(true, `poäng sparad för ${who} (synkar)…`);
      enqueueAndSync('saveScores', { scores: JSON.stringify({ [who]: val }) });
      // vi behöver inte refresh direkt, men du får en mjuk reload efter flush
    });
  });

  // Försök flush direkt vid start om det ligger saker i kö
  if(pendingCount() > 0){
    scheduleFlush(sendJobToServer, 200);
  }
}

// ===== Autocomplete (TMDb) =====
function debounce(fn, ms=250){
  let t;
  return (...args)=>{
    clearTimeout(t);
    t = setTimeout(()=>fn(...args), ms);
  };
}

async function tmdbSearchMovies(query, limit=8){
  if(!TMDB_KEY || !query) return [];
  const url = `${TMDB_URL}/search/movie?api_key=${encodeURIComponent(TMDB_KEY)}&language=sv-SE&include_adult=false&query=${encodeURIComponent(query)}`;
  const r = await fetch(url, {cache:'no-store'}).catch(()=>null);
  if(!r || !r.ok) return [];
  const j = await r.json();
  const res = Array.isArray(j?.results) ? j.results : [];
  return res.slice(0, limit).map(it=>({
    title: it.title || it.original_title || '',
    year: (it.release_date||'').slice(0,4) || '',
  }));
}

function hideAc(id){
  const box = document.getElementById(`ac-${id}`);
  if(box){ box.style.display = 'none'; box.innerHTML = ''; }
}
function showAc(id, items, onPick){
  const box = document.getElementById(`ac-${id}`);
  if(!box) return;

  if(!items.length){
    hideAc(id);
    return;
  }

  box.innerHTML = items.map((x,i)=>`
    <div class="ac-item" data-i="${i}">
      <div><strong>${escapeHtml(x.title)}</strong> <span class="ac-muted">${escapeHtml(x.year)}</span></div>
    </div>
  `).join('');
  box.style.display = 'block';

  box.querySelectorAll('.ac-item').forEach(el=>{
    el.addEventListener('click', ()=>{
      const i = Number(el.getAttribute('data-i'));
      onPick(items[i]);
      hideAc(id);
    });
  });
}

function bindAutocomplete(id){
  const input = document.getElementById(id);
  const box = document.getElementById(`ac-${id}`);
  if(!input || !box) return;

  const doSearch = debounce(async ()=>{

    const q = (input.value || '').trim();
    if(q.length < 2){ hideAc(id); return; }

    const hits = await tmdbSearchMovies(q, 8);
    showAc(id, hits, (pick)=>{
      // Sätt värdet som "Titel (År)" – funkar bra för dina lookups
      input.value = pick.year ? `${pick.title} (${pick.year})` : pick.title;
      // trigga din befintliga lookup-render på change
      input.dispatchEvent(new Event('change', {bubbles:true}));
    });
  }, 220);

  input.addEventListener('input', doSearch);
}

// Stäng autocomplete-listor när man klickar utanför alla .ac-wrap (bind EN gång)
document.addEventListener('click', (e)=>{
  if (e.target?.closest?.('.ac-wrap')) return;
  ['w1','w2','w3','w4','w5','suggested'].forEach(hideAc);
});
