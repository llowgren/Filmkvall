<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Filmkväll</title>

  <link rel="icon" type="image/png" href="Logo.PNG">
  <meta property="og:title" content="Filmkväll">
  <meta property="og:type" content="website">
  <meta property="og:image" content="Logo.PNG">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:image" content="Logo.PNG">

  <!-- (valfritt men rekommenderat) cache-bust av CSS vid behov -->
  <link rel="stylesheet" href="./styles.css">
</head>

<body>
  <div class="wrap">

    <header class="hero">
      <div class="hero-main">
        <img
          src="Logo.PNG"
          alt="Filmkväll logotyp"
          class="hero-logo"
        />

        <div class="hero-text">
          <h1 class="hero-title">Filmkväll</h1>
          <div class="muted hero-version">
            Build: <span id="appVersion">–</span>
          </div>
        </div>
      </div>
    </header>

    <!-- Moduler i ordning -->
    <film-login></film-login>
    <film-now></film-now>
    <film-wishlist></film-wishlist>
    <film-tops></film-tops>
    <film-history></film-history>
    <film-system></film-system>

  </div>

  <script type="module">
    // Visar en "riktig" version: hash av innehållet i de filer som faktiskt hämtas.
    // Detta avslöjar om du tittar på cache/fel deploy, eftersom hash då skiljer sig.
    async function computeBuildSignature() {
      const verEl = document.getElementById('appVersion');
      if (!verEl) return;

      // Visa direkt vilken miljö/URL du tittar på (hjälper vid "fel deploy")
      const where = `${location.host}${location.pathname}`;
      verEl.textContent = `… (${where})`;
      verEl.title = location.href;

      // Viktiga filer som definierar UI + logik
      const files = [
        './styles.css',
        './store.js',
        './film-login.js',
        './api.js',
        './film-now.js',
        './film-wishlist.js',
        './movie-recommendations.js',
        './film-tops.js',
        './film-history.js',
        './film-system.js',
      ];

      // Cache-bust så vi verkligen får det som serveras NU (inte en gammal browser-cache)
      const bust = `v=${Date.now()}`;

      const texts = await Promise.all(
        files.map(async (p) => {
          const url = p + (p.includes('?') ? '&' : '?') + bust;
          const r = await fetch(url, { cache: 'no-store' });
          // Om något saknas (404) vill vi se det i hash/indikatorn också
          const t = await r.text().catch(() => '');
          return `/* ${p} | ${r.status} */\n` + t;
        })
      );

      const data = new TextEncoder().encode(texts.join('\n\n'));
      const digest = await crypto.subtle.digest('SHA-256', data);
      const hex = Array.from(new Uint8Array(digest))
        .map(b => b.toString(16).padStart(2, '0'))
        .join('');

      const short = hex.slice(0, 12);
      verEl.textContent = `${short} (${where})`;
      verEl.title = `SHA-256: ${hex}\n` + location.href;
    }

    // Kör signatur-beräkningen när sidan är igång, så första responsen inte bromsas.
    const runBuildSignature = () => computeBuildSignature().catch(() => {});
    if ('requestIdleCallback' in window) {
      requestIdleCallback(runBuildSignature, { timeout: 4000 });
    } else {
      setTimeout(runBuildSignature, 2500);
    }

    // 1) Store först (sätter tema direkt vid import)
    await import('./store.js');

    // 2) Login (sätter auth/who/apiUrl via film-login)
    await import('./film-login.js');

    // 3) API (läser auth från store + apiUrl från film-login)
    await import('./api.js');

    // 4) UI-moduler kan laddas parallellt när basmodulerna finns.
    await Promise.all([
      import('./film-now.js'),
      import('./film-wishlist.js'),
      import('./film-tops.js'),
      import('./film-history.js'),
      import('./film-system.js'),
    ]);

    // 5) Personliga, snabba förslag baserade på historik och betyg.
    import('./movie-recommendations.js')
      .then((m) => m.installMovieRecommendations?.())
      .catch(() => {});
  </script>
</body>
</html>
